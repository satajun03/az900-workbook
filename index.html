<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 学習アプリ</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1b2733;--sub:#5b6b7b;--brand:#0a64c2;--brand2:#0850a0;--ok:#138a36;--ng:#c2331a;--line:#e2e8f0;--accent:#7a3fc0;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;}
header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:20px 16px 0;}
header h1{margin:0 0 4px;font-size:1.3rem;}
header p{margin:0 0 14px;opacity:.92;font-size:.82rem;}
.tabs{display:flex;gap:4px;}
.tabbtn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:11px 20px;border-radius:10px 10px 0 0;cursor:pointer;font-size:.95rem;font-weight:600;font-family:inherit;}
.tabbtn.active{background:var(--bg);color:var(--brand2);}
.wrap{max-width:840px;margin:0 auto;padding:16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
h2{font-size:1.05rem;margin:0 0 12px;}
label{font-size:.85rem;color:var(--sub);display:block;margin-bottom:6px;}
select,button,input{font-size:1rem;font-family:inherit;}
select,input[type=text]{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:14px;}
.btn{background:var(--brand);color:#fff;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:600;transition:.15s;}
.btn:hover{background:var(--brand2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn.ghost{background:#eef3f9;color:var(--brand2);}
.btn.ghost:hover{background:#dfe9f5;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.toggle{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--sub);margin-bottom:14px;}
.toggle input{width:18px;height:18px;}
.progress{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px;}
.progress > i{display:block;height:100%;background:var(--brand);width:0;transition:.3s;}
.meta{display:flex;justify-content:space-between;font-size:.82rem;color:var(--sub);margin-bottom:10px;}
.pill{display:inline-block;background:#eef3f9;color:var(--brand2);font-size:.72rem;padding:3px 9px;border-radius:99px;margin-bottom:10px;}
.qtext{font-size:1.08rem;font-weight:600;margin:6px 0 16px;}
.choice{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:.12s;font-size:.98rem;}
.choice:hover{border-color:var(--brand);background:#f7fbff;}
.choice.correct{border-color:var(--ok);background:#eafaf0;}
.choice.wrong{border-color:var(--ng);background:#fdeeea;}.choice.sel{border-color:var(--brand);background:#eaf2fc;}
.choice.disabled{cursor:default;pointer-events:none;}
.exp{margin-top:8px;padding:13px 15px;border-radius:11px;background:#f3f7fc;border-left:4px solid var(--brand);font-size:.92rem;display:none;}
.exp.show{display:block;}
.exp b{color:var(--brand2);}
.result-num{font-size:2.4rem;font-weight:700;color:var(--brand);}
.center{text-align:center;}
.hidden{display:none;}
footer{text-align:center;color:var(--sub);font-size:.75rem;padding:20px;}
.tag{font-size:.72rem;color:var(--sub);}
.gcard{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:#fff;}
.gterm{font-size:1.05rem;font-weight:700;color:var(--brand2);margin-bottom:4px;}
.gcat{font-size:.7rem;color:var(--sub);background:#f1f5fb;padding:2px 8px;border-radius:99px;display:inline-block;margin-bottom:8px;}
.gdef{font-size:.93rem;margin-bottom:8px;}
.gana{font-size:.9rem;background:#faf6ff;border-left:4px solid var(--accent);padding:9px 12px;border-radius:8px;color:#3a2a52;}
.gana b{color:var(--accent);}
.flashwrap{perspective:1000px;}
.flash{position:relative;min-height:230px;border-radius:14px;cursor:pointer;transition:transform .5s;transform-style:preserve-3d;}
.flash.flipped{transform:rotateY(180deg);}
.flace{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:14px;padding:22px;display:flex;flex-direction:column;justify-content:center;background:#fff;}
.fback{transform:rotateY(180deg);background:#faf9ff;overflow:auto;}
.fhint{font-size:.72rem;color:var(--sub);position:absolute;bottom:10px;left:0;right:0;text-align:center;}
.gcard{position:relative;}.revbtn{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;color:var(--sub);font-size:.72rem;font-family:inherit;padding:4px 10px;border-radius:999px;cursor:pointer;margin-top:8px;transition:.12s;}.revbtn:hover{background:#f4f6fb;}.revbtn.on{background:#fff4e6;border-color:#e8a33d;color:#b9701b;font-weight:600;}.revfilter{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--sub);margin:0 0 12px;cursor:pointer;}.revfilter input{width:16px;height:16px;}.frev{margin-top:14px;text-align:center;}</style>
</head>
<body>
<header>
  <div class="wrap" style="padding-bottom:0;">
    <h1>AZ-900 学習アプリ</h1>
    <p>Microsoft Azure Fundamentals 対策 ｜ 問題集 & 単語帳（オリジナル）</p>
    <div class="tabs">
      <button class="tabbtn active" id="tabQuiz">問題集</button>
      <button class="tabbtn" id="tabGloss">単語帳</button>
    </div>
  </div>
</header>
<div class="wrap">
  <!-- ===== 問題集 ===== -->
  <div id="modeQuiz">
    <div id="setup" class="card">
      <h2>出題設定</h2>
      <label>カテゴリ</label><select id="selCat"></select>
      <label>テーマ（任意・カテゴリ選択後に絞り込み）</label><select id="selTopic"></select>
      <div class="toggle"><input type="checkbox" id="chkShuffle" checked><label for="chkShuffle" style="margin:0;">問題と選択肢をシャッフルする</label></div>
      <div class="row"><button class="btn" id="btnStart">開始する</button></div>
      <p class="tag" id="countInfo" style="margin-top:12px;"></p>
    </div>
    <div id="quiz" class="card hidden">
      <div class="progress"><i id="bar"></i></div>
      <div class="meta"><span id="progText"></span><span id="scoreText"></span></div>
      <span class="pill" id="topicPill"></span>
      <div class="qtext" id="qText"></div>
      <div id="choices"></div>
      <button class="btn" id="btnSubmitMulti" style="display:none;margin-top:4px;">回答する</button>
      <div class="exp" id="exp"></div>
      <div class="row" style="margin-top:16px;justify-content:space-between;">
        <button class="btn ghost" id="btnQuit">中断して設定へ</button>
        <button class="btn" id="btnNext" disabled>次へ</button>
      </div>
    </div>
    <div id="result" class="card hidden center">
      <h2>結果</h2>
      <p class="result-num" id="resNum"></p>
      <p id="resText" style="color:var(--sub);"></p>
      <div class="row center" style="justify-content:center;margin-top:8px;">
        <button class="btn" id="btnRetry">もう一度（同じ範囲）</button>
        <button class="btn ghost" id="btnReview" disabled>間違えた問題だけ復習</button>
        <button class="btn ghost" id="btnHome">設定に戻る</button>
      </div>
    </div>
  </div>
  <!-- ===== 単語帳 ===== -->
  <div id="modeGloss" class="hidden">
    <div class="card">
      <h2>単語帳</h2>
      <label>カテゴリ</label><select id="gCat"></select>
      <label>キーワード検索</label><input type="text" id="gSearch" placeholder="用語名・説明で絞り込み">
      <label class="revfilter"><input type="checkbox" id="gRevOnly">要復習の用語のみ表示</label>
      <div class="row" style="margin-bottom:8px;">
        <button class="btn ghost" id="gModeList">一覧表示</button>
        <button class="btn" id="gModeCard">フラッシュカード</button>
      </div>
      <p class="tag" id="gCount"></p>
    </div>
    <div id="gList"></div>
    <div id="gFlash" class="hidden">
      <div class="card flashwrap">
        <div class="flash" id="flashCard">
          <div class="flace ffront"><span class="gcat" id="fcat"></span><div class="gterm" id="fterm" style="font-size:1.3rem;"></div><div class="fhint">タップ／クリックで答えを表示</div></div>
          <div class="flace fback"><div class="gdef" id="fdef"></div><div class="gana" id="fana"></div><div class="fhint">タップ／クリックで戻る</div></div>
        </div>
      </div>
      <div class="frev"><button class="revbtn" id="fRev"></button></div>
      <div class="row" style="justify-content:space-between;">
        <button class="btn ghost" id="fPrev">← 前へ</button>
        <span class="tag center" id="fProg" style="align-self:center;"></span>
        <button class="btn" id="fNext">次へ →</button>
      </div>
    </div>
  </div>
</div>
<footer>AZ-900 学習アプリ ｜ 問題・解説・たとえ話はすべてオリジナルに作成した学習用コンテンツです</footer>
<script>
(function(){

const QUESTIONS = [{"cat":"クラウドの概念","topic":"クラウドコンピューティングの特徴","q":"クラウドコンピューティングの基本的な特徴として最も適切なものはどれですか？","choices":["利用前に必ずピーク需要に合わせた容量を購入しておく必要がある","インターネット経由でオンデマンドにコンピューティング資源を利用できる","リソースの増減には数週間の調達期間が必要となる","リソースは特定の物理サーバーに固定され移動できない"],"answer":1,"exp":"クラウドは必要なときに必要なだけリソースをオンデマンドに利用できる点が本質です。事前のピーク容量確保は不要です。"},{"cat":"クラウドの概念","topic":"クラウドコンピューティングの特徴","q":"クラウドの「従量課金（消費ベース）モデル」を最もよく表しているのはどれですか？","choices":["年間のリソース上限を前払いし、使い切らなくても返金されない","実際に使用したリソース量に応じて課金される","契約したインスタンス数に対して固定額が毎月課金される","ピーク時に確保した最大容量に常時課金される"],"answer":1,"exp":"消費ベースモデルは実際の使用量に基づく課金です。前払い容量や固定額課金は従量課金とは異なります。"},{"cat":"クラウドの概念","topic":"クラウドサービスの拡張機能","q":"需要の増減に応じてリソースを自動的に増減させるクラウドの能力を何と呼びますか？","choices":["弾力性（エラスティシティ）","可用性（アベイラビリティ）","耐久性（デュラビリティ）","リージョンペアリング"],"answer":0,"exp":"弾力性は需要に応じてリソースを自動的に増減する能力です。可用性は稼働継続性、耐久性はデータ保全性で別概念です。"},{"cat":"クラウドの概念","topic":"クラウドサービスの拡張機能","q":"スケールアップ（垂直スケーリング）の説明として正しいものはどれですか？","choices":["同種のサーバーの台数を増やして負荷を分散する","既存のサーバーのCPUやメモリなどの性能を増強する","データを複数リージョンに複製して冗長化する","負荷に応じてインスタンス数を自動増減させる"],"answer":1,"exp":"スケールアップは単一インスタンスのスペック増強です。台数を増やすのはスケールアウト（水平スケーリング）で、混同に注意です。"},{"cat":"クラウドの概念","topic":"責任共有モデルの基本","q":"クラウドの責任共有モデルにおいて、物理データセンターのセキュリティに責任を持つのは誰ですか？","choices":["利用者（顧客）","クラウドプロバイダー","利用者とプロバイダーがサービスごとに分担する","リージョンを管理する地域の規制当局"],"answer":1,"exp":"物理データセンター・物理ホスト・物理ネットワークのセキュリティは、サービスモデルを問わず常にプロバイダーの責任です。"},{"cat":"クラウドの概念","topic":"責任共有モデルの基本","q":"責任共有モデルで、どのサービスモデルでも常に利用者側の責任に含まれるものはどれですか？","choices":["ハイパーバイザーの保守","データとアカウント／IDの管理","物理ネットワークの構成","ホストOSの基盤パッチ"],"answer":1,"exp":"データ・デバイス・アカウント／IDの管理はIaaS/PaaS/SaaSのいずれでも利用者責任に残ります。基盤側はプロバイダー責任です。"},{"cat":"クラウドの概念","topic":"クラウドサービスモデルの責任範囲","q":"IaaS・PaaS・SaaSを利用者の管理責任が大きい順に並べたものはどれですか？","choices":["SaaS > PaaS > IaaS","IaaS > PaaS > SaaS","PaaS > SaaS > IaaS","SaaS > IaaS > PaaS"],"answer":1,"exp":"IaaSはOS・ミドルウェアまで利用者管理で責任最大、SaaSは利用者責任が最小です。"},{"cat":"クラウドの概念","topic":"クラウドサービスモデルの責任範囲","q":"OSのパッチ適用が利用者の責任となるのは主にどのサービスモデルですか？","choices":["SaaS（アプリの設定のみ利用者責任）","PaaS（ランタイムまでプロバイダー管理）","IaaS（OS以上を利用者が管理）","どのモデルでもプロバイダーが一括管理する"],"answer":2,"exp":"IaaSではゲストOSの管理（パッチ含む）が利用者責任です。PaaS/SaaSではOSを含む基盤はプロバイダー管理です。"},{"cat":"クラウドの概念","topic":"クラウドモデルの特徴","q":"パブリッククラウドの特徴として最も適切なものはどれですか？","choices":["単一組織が専有し、他社とハードウェアを共有しない","プロバイダー所有のインフラを複数の組織が共有して利用する","利用者の社内データセンター内に閉じて運用する","必ずオンプレミスとの常時接続を前提とする"],"answer":1,"exp":"パブリッククラウドはプロバイダー所有インフラを複数組織で共有します。専有はプライベートクラウドの特徴です。"},{"cat":"クラウドの概念","topic":"クラウドモデルの特徴","q":"ハイブリッドクラウドの説明として正しいものはどれですか？","choices":["複数のパブリッククラウドのみを併用する形態","オンプレミスとパブリッククラウドを組み合わせ連携させる形態","単一のパブリッククラウドだけを利用する形態","社内データセンターのみで完結させる形態"],"answer":1,"exp":"ハイブリッドはオンプレミスとパブリッククラウドを連携させる構成です。複数パブリッククラウド併用はマルチクラウドです。"},{"cat":"クラウドの概念","topic":"マルチクラウド環境の利用","q":"マルチクラウドを採用する主な理由として適切でないものはどれですか？","choices":["特定ベンダーへのロックインを避ける","各クラウドの得意なサービスを使い分ける","複数クラウドで冗長性を確保する","データを単一ベンダーに集約して運用を一本化する"],"answer":3,"exp":"マルチクラウドはロックイン回避・使い分け・冗長性が目的です。単一ベンダー集約はその目的に反します。"},{"cat":"クラウドの概念","topic":"CapExとOpExの違い","q":"CapEx（資本的支出）に該当するのはどれですか？","choices":["クラウドVMの時間単位の利用料","自社データセンターのサーバー設備の購入費用","従量課金のストレージ転送料金","サブスクリプションの月額利用料"],"answer":1,"exp":"CapExは設備・資産を前もって購入する支出です。時間課金・従量課金・月額利用料は使った分を払うOpExです。"},{"cat":"クラウドの概念","topic":"CapExとOpExの違い","q":"クラウドの従量課金モデルが分類される支出区分はどれですか？","choices":["CapEx（資本的支出）","OpEx（運用的支出）","前払いの設備投資","固定資産の減価償却"],"answer":1,"exp":"クラウド利用料は継続的に経費計上するOpExです。設備購入や減価償却はCapEx側の概念です。"},{"cat":"クラウドの概念","topic":"クラウドコンピューティングの利点","q":"クラウド導入により市場投入までの時間が短縮される理由として最も適切なものはどれですか？","choices":["物理機器の調達・構築を待たずにすぐリソースを利用できるから","リソースを必ず長期契約で前もって確保するから","本番展開前に必ず物理サーバーを追加購入するから","容量変更のたびに数週間の承認プロセスが必要だから"],"answer":0,"exp":"クラウドは数分でリソースを展開でき、調達・構築の待ち時間がなくなるため素早く形にできます。"},{"cat":"クラウドの概念","topic":"クラウドの高可用性の特徴","q":"高可用性（High Availability）が意味するものとして最も適切なものはどれですか？","choices":["障害が起きてもサービスを継続できるよう冗長化されている","保存データを長期にわたり失わずに保てる","処理のスループットが理論上の最大値に固定される","データが地理的に複製され災害から復旧できる"],"answer":0,"exp":"高可用性は障害時もサービスを継続する特性です。データ保全は耐久性、災害復旧はDR/信頼性の観点で区別されます。"},{"cat":"クラウドの概念","topic":"スケーラビリティの利点","q":"スケーラビリティの利点として最も適切なものはどれですか？","c を提供します。専用線の非インターネット接続はExpressRouteの役割です。"},{"cat":"アーキテクチャとサービス","topic":"Azure ExpressRouteの機能","q":"Azure ExpressRouteの特徴として正しいものはどれですか？","choices":["接続プロバイダー経由で公衆インターネットを通らないプライベート接続を提供する","インターネット上に暗号化トンネルを張って接続する","常時無料で利用できる接続オプションである","単一の仮想マシンとして提供される接続機能である"],"answer":0,"exp":"ExpressRouteは公衆インターネットを経由しない専用接続です。インターネット経由の暗号化トンネルはVPNで、両者は対比されます。"},{"cat":"アーキテクチャとサービス","topic":"ExpressRouteの接続モデル","q":"ExpressRouteがVPNと比べて優れている点として最も適切なものはどれですか？","choices":["インターネットを経由しないため安定した低遅延・高帯域を得やすい","設定が一切不要で自動構成される","必ず無料で利用できる","暗号化が不要なため設定が簡単になる"],"answer":0,"exp":"ExpressRouteはインターネットを経由しないため一貫した低遅延・高帯域・信頼性を得やすい点が利点です。無料や無設定ではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azure DNSの利点について","q":"Azure DNSの利点として正しいものはどれですか？","choices":["Microsoftのグローバルインフラ上でDNSドメインをホストし高信頼な名前解決を行える","ドメイン名そのものを新規に登録・購入できる","VMのリソース使用状況を監視できる","ストレージを冗長化できる"],"answer":0,"exp":"Azure DNSはドメインのホスティングと名前解決を提供します。ドメインの登録（取得）は別機能で、混同しやすい点です。"},{"cat":"アーキテクチャとサービス","topic":"Azure DNSの機能について","q":"Azure DNSが行う役割として正しいものはどれですか？","choices":["ドメイン名をIPアドレスに解決する","送信元IPに基づきトラフィックを暗号化する","負荷に応じてサーバーを自動増減する","保存データを暗号化する"],"answer":0,"exp":"DNSはドメイン名とIPアドレスの対応付け（名前解決）を担います。暗号化やオートスケールは別サービスの役割です。"},{"cat":"アーキテクチャとサービス","topic":"Azure VMの特徴","q":"Azure仮想マシン（VM）に関する記述として正しいものはどれですか？","choices":["IaaSであり、OSやインストールするソフトウェアを利用者が制御できる","PaaSであり、OSの管理は不要でコードだけを置く","物理サーバーそのものを占有して借りる形態である","サーバーレスで実行時のみ課金される"],"answer":0,"exp":"Azure VMはIaaSでOS以上を利用者が制御し保守責任も負います。OS管理不要はPaaS、実行時課金はサーバーレスの特徴です。"},{"cat":"アーキテクチャとサービス","topic":"仮想マシン可用性セット","q":"可用性セット（Availability Set）の目的として正しいものはどれですか？","choices":["VMを障害ドメインと更新ドメインに分散し同時停止を防ぐ","複数リージョンへVMを複製して災害に備える","VM単体のCPU・メモリを増強して性能を上げる","負荷に応じてVM台数を自動で増減する"],"answer":0,"exp":"可用性セットは障害/更新ドメインへの分散で同時ダウンを避けます。複数リージョン複製はDR、性能増強はスケールアップ、自動増減はVMSSです。"},{"cat":"アーキテクチャとサービス","topic":"仮想マシンスケールセット","q":"仮想マシンスケールセット（VMSS）の特徴として正しいものはどれですか？","choices":["同一構成のVM群を負荷に応じて自動的に増減できる","1台のVMの性能を動的に増強する","異なるOSのVMを1つにまとめて管理する","VMをリージョンペアへ複製する"],"answer":0,"exp":"VMSSは同一構成VMを自動スケールします。単体性能増強はスケールアップ、リージョン複製はDRで主目的ではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azure Virtual Desktopの機能","q":"Azure Virtual Desktop（AVD）の機能として正しいものはどれですか？","choices":["クラウド上で仮想デスクトップとアプリをユーザーに配信する","物理PCを各ユーザーへ配送して管理する","コンテナをオーケストレーションする","リレーショナルデータベースをホストする"],"answer":0,"exp":"AVDはWindowsデスクトップやアプリをAzure上で仮想化し配信するDaaSです。コンテナ管理やDBホスティングは別サービスの役割です。"},{"cat":"アーキテクチャとサービス","topic":"Azure Virtual Desktopのセキュリティ機能","q":"AVDがセキュリティ面で提供する利点として正しいものはどれですか？","choices":["データやアプリをローカル端末ではなくクラウド側に保持できる","端末にすべてのデータをローカル保存させて高速化する","認証を不要にして利便性を高める","通信の暗号化を無効化して負荷を下げる"],"answer":0,"exp":"AVDはデータをクラウド側に集約するため端末紛失時の漏えいリスクを低減し、多要素認証や条件付きアクセスとも統合できます。"},{"cat":"アーキテクチャとサービス","topic":"コンテナーと仮想マシンの違い","q":"コンテナーと仮想マシンの違いとして正しいものはどれですか？","choices":["コンテナーはホストOSのカーネルを共有し軽量・高速、VMはOSごと仮想化する","コンテナーは各自が完全なゲストOSを持ち、VMより重い","VMはOSを持たずアプリのみを実行する","両者の起動速度やリソース消費に違いはない"],"answer":0,"exp":"コンテナーはホストOSのカーネルを共有しアプリと依存関係のみをパッケージ化するため軽量です。完全なゲストOSを持つのはVM側です。"},{"cat":"アーキテクチャとサービス","topic":"Azureでのコンテナ管理サービス","q":"大規模なコンテナのオーケストレーションに用いられるAzureサービスはどれですか？","choices":["Azure Kubernetes Service（AKS）","Azure Virtual Machines","Azure App Service の WebJobs","Azure Blob Storage"],"answer":0,"exp":"AKSはKubernetesベースのマネージドサービスで多数のコンテナのデプロイ・スケール・管理を自動化します。他はコンテナのオーケストレーターではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azure Functionsの特徴","q":"Azure Functionsの特徴として正しいものはどれですか？","choices":["イベント駆動で実行されるサーバーレスのコンピューティング","常時稼働するVMとしてアプリを動かす","コンテナのクラスターを管理する","仮想ネットワークを構成する"],"answer":0,"exp":"Functionsはサーバーレスでイベントに応じてコードを実行し、インフラ管理が不要です。常時稼働VMやクラスター管理とは異なります。"},{"cat":"アーキテクチャとサービス","topic":"Azure Functionsの課金モデル","q":"Azure Functions（従量課金プラン）の課金の特徴として正しいものはどれですか？","choices":["実行回数や実行時間など実際の使用量に応じて課金される","割り当てたインスタンスに対して常時固定額が課金される","アイドル時も最大構成分の料金が発生する","事前購入した実行回数を使い切ると停止する"],"answer":0,"exp":"従量課金プランは実行回数・時間・メモリ使用量で課金され、アイドル時のコストを抑えられます。固定額や常時課金は当てはまりません。"},{"cat":"アーキテクチャとサービス","topic":"Azureでアプリホスティング","q":"Webアプリをインフラ管理なしでホストしたい場合に適したPaaSサービスはどれですか？","choices":["Azure App Service","Azure Virtual Machines を手動構築","Azure Kubernetes Service のみ","Azure DNS"],"answer":0,"exp":"App ServiceはWebアプリ等をホストするフルマネージドPaaSで、OS管理なしでデプロイ・スケールできます。VM手動構築はIaaSで管理負荷が高くなります。"},{"cat":"アーキテクチャとサービス","topic":"WebJobsでのタスク管理","q":"Azure App ServiceのWebJobsの用途として正しいものはどれですか？","choices":["App Serviceのコンテキストでバックグラウンドタスクやスクリプトを実行する","仮想ネットワークのルーティングを構成する","コンテナクラスターをスケールする","DNSゾーンをホストする"],"answer":0,"exp":"WebJobsはApp Service上でバックグラウンド処理（スケジュール/継続実行）を行う機能です。ネットワークやDNSの役割ではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azure仮想ネットワークの機能","q":"Azure Virtual Network（VNet）の機能として正しいものはどれですか？","choices":["Azureリソース間やオンプレミスとのプライベートな通信を提供する","Azureリソース間のみに限定されオンプレミスとは通信できない","常に公衆インターネット経由でのみ通信する","ドメイン名の名前解決を専門に行う"],"answer":0,"exp":"VNetはAzureリソース間に加え、VPN/ExpressRoute経由でオンプレミスとも安全に通信できます。リソース間のみという限定は誤りです。名前解決はDNSの役割です。"},{"cat":"アーキテクチャとサービス","topic":"パブリックとプライベートエンドポイント","q":"プライベートエンドポイントの利点として正しいものはどれですか？","choices":["PaaSサービスへの接続をVNet内のプライベートIPで行い公衆インターネットを経由しない","PaaSサービスを常に公衆インターネットに公開して接続性を高める","接続時の認証を省略できる","サービスのSLAを自動的に引き上げる"],"answer":0,"exp":"プライベートエンドポイントはVNet内のプライベートIPでPaaSに接続し、トラフィックを公衆インターネットにさらしません。公開や認証省略とは逆の発想です。"},{"cat":"アーキテクチャとサービス","topic":"オンプレミスとAzureの接続方法","q":"オンプレミスとAzureを接続する方法として適切でないものはどれですか？","choices":["VPN Gateway（サイト間VPN）","ExpressRoute","ポイント対サイトVPN","Azure Policy によるポリシー割り当て"],"answer":3,"exp":"オンプレミス接続にはVPN GatewayやExpressRouteを用います。Azure Policyはガバナンス用で、接続手段ではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azureストレージの冗長性","q":"ローカル冗長ストレージ（LRS）の説明として正しいものはどれですか？","choices":["単一データセンター内でデータを3つ複製する","同一リージョン内の複数の可用性ゾーンに複製する","別リージョンへも複製して広域災害に備える","複製を行わず単一コピーのみ保持する"],"answer":0,"exp":"LRSは単一データセンター内で3コピーを保持します。複数ゾーンへの複製はZRS、別リージョン複製はGRSで、冗長レベルが異なります。"},{"cat":"アーキテクチャとサービス","topic":"ストレージアカウントのサービス","q":"Azureストレージアカウントが提供するサービスとして適切でないものはどれですか？","choices":["Blob（オブジェクト）","File（ファイル共有）","Queue（メッセージング）","Virtual Machine（仮想マシン）"],"answer":3,"exp":"ストレージアカウントはBlob・File・Queue・Tableを提供します。仮想マシンはコンピューティング側のサービスで、ストレージアカウントには含まれません。"},{"cat":"アーキテクチャとサービス","topic":"冗長性オプションの選択基準","q":"地理的に離れた場所への複製で広域災害に備えたい場合に選ぶ冗長性はどれですか？","choices":["GRS（地理冗長ストレージ）","LRS（ローカル冗長ストレージ）","単一データセンター内の追加コピー","可用性ゾーン内のみの複製"],"answer":0,"exp":"GRSはプライマリに加え数百km離れたセカンダリリージョンへも複製しリージョン災害に備えます。LRSやZRSは同一リージョン内に留まります。"},{"cat":"アーキテクチャとサービス","topic":"ローカル冗長ストレージ(LRS)の特徴","q":"LRSの特徴として正しいものはどれですか？","choices":["最も低コストだが単一データセンター障害には弱い","最も高コストで世界中に複製する","可用性ゾーン障害に耐えられる","別リージョンにも自動で複製される"],"answer":0,"exp":"LRSは同一データセンター内3コピーの最も安価なオプションですが、データセンター全体の障害には弱いです。ゾーンや別リージョン保護はZRS/GRSです。"},{"cat":"アーキテクチャとサービス","topic":"高可用性のためのストレージ","q":"単一データセンター障害に備えつつ同一リージョン内で可用性を高めたい場合に適した冗長性はどれですか？","choices":["ZRS（ゾーン冗長ストレージ）","LRS（ローカル冗長ストレージ）","単一コピーのみ保持する構成","オンプレミスへのバックアップのみ"],"answer":0,"exp":"ZRSは同一リージョン内の複数の可用性ゾーンへ複製し、1ゾーン障害に耐えます。LRSは単一データセンターに留まります。"},{"cat":"アーキテクチャとサービス","topic":"Azure Blob Storageの用途","q":"Azure Blob Storageの用途として最も適切なものはどれですか？","choices":["画像・動画・バックアップなど非構造化オブジェクトデータの保存","リレーショナルデータの結合クエリの実行","SMBによるファイル共有のマウント","仮想マシンの起動とOSの実行"],"answer":0,"exp":"Blobは大量の非構造化（オブジェクト）データの保存に最適です。リレーショナルクエリはSQL Database、SMB共有はAzure Filesが担います。"},{"cat":"アーキテクチャとサービス","topic":"Azure Storageのアクセス方法","q":"Blobへのアクセスを期限付き・権限限定で安全に許可する仕組みはどれですか？","choices":["SAS（Shared Access Signature）","コンテナーを常時パブリック公開する設定","ストレージアカウントキーを相手に直接渡す","NSG（ネットワークセキュリティグループ）のみ"],"answer":0,"exp":"SASは有効期限と権限を限定したトークン付きURLで一時的アクセスを許可します。常時公開やアカウントキー共有はリスクが高く適切ではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azureデータサービス比較","q":"フルマネージドのリレーショナルデータベースを利用したい場合に適したサービスはどれですか？","choices":["Azure SQL Database","Azure Blob Storage","Azure Files","Azure Queue Storage"],"answer":0,"exp":"Azure SQL DatabaseはパッチやバックアップをMicrosoftが管理するフルマネージドのリレーショナルDBです。他はオブジェクト/ファイル/キューのストレージです。"},{"cat":"アーキテクチャとサービス","topic":"Azure Filesの利点","q":"Azure Filesの利点として正しいものはどれですか？","choices":["SMB/NFSでマウントできるクラウド上の共有ファイルストレージを提供する","非構造化オブジェクトをHTTP APIでのみ操作する","リレーショナルクエリを実行できる","メッセージキューとして非同期処理を仲介する"],"answer":0,"exp":"Azure FilesはSMB/NFSでマウントできる共有ファイルストレージです。HTTP APIのオブジェクト操作はBlob、キューはQueue Storageの役割です。"},{"cat":"アーキテクチャとサービス","topic":"Azureストレージの特徴","q":"Azure Storageの基本的な特徴として正しいものはどれですか？","choices":["スケーラブルで耐久性が高く、保存データは既定で暗号化される","保存データは既定では暗号化されず利用者が別途実装する","容量が固定で後から拡張できない","単一サーバーのローカルディスクにのみ保存される"],"answer":0,"exp":"Azure Storageは高耐久・スケーラブルで、保存データは既定でサーバー側暗号化により保護されます。容量も柔軟に拡張できます。"},{"cat":"アーキテクチャとサービス","topic":"Azure Migrateの機能","q":"Azure Migrateの目的として正しいものはどれですか？","choices":["オンプレミス環境の評価とAzureへの移行を一元的に支援する","稼働中のコンテナを自動でスケールする","DNSゾーンをホストする","コストの推奨事項のみを提示する"],"answer":0,"exp":"Azure Migrateはサーバー・DB・Webアプリ等の移行を評価から実行まで支援するハブです。スケールやDNS、推奨提示（Advisor）は別の役割です。"},{"cat":"アーキテクチャとサービス","topic":"Azure Data Boxのユースケース","q":"Azure Data Boxが適しているユースケースはどれですか？","choices":["帯域の制約でオンライン転送が難しい大容量データを物理デバイスで移送する","数MBの少量データをリアルタイムに送る","オンプレミスとの常時暗号化接続を確立する","データベースのクエリを高速化する"],"answer":0,"exp":"Data Boxは数十〜数百TB級を帯域制約下で物理デバイス移送します。少量リアルタイム転送や常時接続（VPN/ExpressRoute）とは用途が異なります。"},{"cat":"アーキテクチャとサービス","topic":"Azure Data Boxの特徴","q":"Azure Data Boxの特徴として正しいものはどれですか？","choices":["堅牢な物理記憶装置にデータを格納し輸送してAzureに取り込む","常時インターネット経由で少量ずつ転送する","オンプレミスとAzure間の専用線を提供する","ストレージの冗長性レベルを指定する設定である"],"answer":0,"exp":"Data Boxは物理デバイスにデータを格納し輸送してアップロードする大容量オフライン移送向けです。専用線（ExpressRoute）や冗長性設定とは別物です。"},{"cat":"アーキテクチャとサービス","topic":"Azureのファイル移動ツール","q":"少量〜中規模のデータをコマンドラインで効率的にAzure Storageへ転送するツールはどれですか？","choices":["AzCopy","Data Box（物理デバイス）","ExpressRoute","Azure Policy"],"answer":0,"exp":"AzCopyはストレージへのコピー・同期を行うコマンドラインツールです。Data Boxは大容量の物理移送、ExpressRouteは接続、Policyはガバナンス用です。"},{"cat":"アーキテクチャとサービス","topic":"AzCopyの特徴","q":"AzCopyの特徴として正しいものはどれですか？","choices":["コマンドラインでスクリプト化しやすく、ストレージのコピー/同期を効率的に行う","GUIのウィザード専用で自動化には使えない","数百TB級を物理デバイスで輸送する","オンプレミスとの専用線を構成する"],"answer":0,"exp":"AzCopyはコマンドラインベースで自動化に適し、ストレージ間のコピー・同期を効率化します。物理輸送はData Box、専用線はExpressRouteです。"},{"cat":"IDとセキュリティ","topic":"Microsoft Entra IDの機能","q":"Microsoft Entra ID（旧Azure AD）の主な機能はどれですか？","choices":["クラウドベースのID・アクセス管理（認証と認可）","仮想マシンのオートスケール","オブジェクトストレージの提供","DNSゾーンのホスティング"],"answer":0,"exp":"Entra IDはユーザーやアプリの認証とリソースへの認可を担うID/アクセス管理サービスです。スケールやストレージ、DNSは別サービスです。"},{"cat":"IDとセキュリティ","topic":"Microsoft Entra IDの利用者","q":"Microsoft Entra IDが管理するIDの対象として適切でないものはどれですか？","choices":["組織の従業員ユーザー","アプリやサービスプリンシパル","招待された外部ゲストユーザー","ストレージアカウント内のBlobファイル"],"answer":3,"exp":"Entra IDはユーザー・ゲスト・アプリ/サービスプリンシパル・デバイスのIDを管理します。Blobファイルはデータであり、IDの対象ではありません。"},{"cat":"IDとセキュリティ","topic":"Microsoft Entra Connectの役割","q":"Microsoft Entra Connectの役割として正しいものはどれですか？","choices":["オンプレミスADとEntra IDのIDを同期しハイブリッドIDを実現する","クラウド上の仮想ネットワークを構成する","Blobストレージを冗長化する","コストを分析して推奨を出す"],"answer":0,"exp":"Entra ConnectはオンプレミスADとクラウドのEntra IDを同期し、ハイブリッドIDとSSOを実現します。ネットワークやストレージの機能ではありません。"},{"cat":"IDとセキュリティ","topic":"Microsoft Entra Domain Servicesの機能","q":"Microsoft Entra Domain Servicesが提供する機能はどれですか？","choices":["ドメイン参加・グループポリシー・LDAP/Kerberosなどのマネージドドメインサービス","コンテナのオーケストレーション","オブジェクトストレージの提供","リソースのコスト最適化提案"],"answer":0,"exp":"Domain Servicesは従来型のドメイン機能（ドメイン参加・GPO・LDAP・Kerberos）をDC管理なしで提供します。他は無関係なサービスです。"},{"cat":"IDとセキュリティ","topic":"Azureでの認証方法","q":"認証（Authentication）と認可（Authorization）の違いとして正しいものはどれですか？","choices":["認証は本人確認、認可はアクセス可能な範囲の決定である","認証はアクセス範囲の決定、認可は本人確認である","認証も認可も同じく暗号化の処理である","認証はネットワーク経路の選択を指す"],"answer":0,"exp":"認証は『あなたは誰か』を確認し、認可は『何にアクセスできるか』を決めます。両者は混同されやすいので区別が重要です。"},{"cat":"IDとセキュリティ","topic":"SSOの安全性","q":"シングルサインオン（SSO）の利点として正しいものはどれですか？","choices":["1回の認証で複数アプリにアクセスでき、管理するパスワードが減り安全性も高まる","各アプリで個別のパスワードを増やし強度を高める","認可の仕組みを不要にできる","多要素認証と併用できない"],"answer":0,"exp":"SSOは1組の資格情報で複数アプリにアクセスでき、パスワードの使い回しを減らし利便性と安全性を両立します。MFAとも併用できます。"},{"cat":"IDとセキュリティ","topic":"多要素認証の要素分類","q":"多要素認証（MFA）の『要素』の正しい組み合わせはどれですか？","choices":["知っているもの・持っているもの・本人自身（生体）","知っているもの・覚えやすいもの・推測しやすいもの","場所・時間・天候","CPU・メモリ・ディスク"],"answer":0,"exp":"MFAは知識情報・所持情報・生体情報の異なる2種類以上を組み合わせます。同じ種類を複数使っても多要素にはなりません。"},{"cat":"IDとセキュリティ","topic":"多要素認証の要素分類","q":"次のうち『持っているもの（所持情報）』に分類される要素はどれですか？","choices":["スマートフォンの認証アプリによる承認","パスワード","セキュリティの質問の答え","指紋"],"answer":0,"exp":"認証アプリやハードウェアトークンは『持っているもの』です。パスワードや質問の答えは『知っているもの』、指紋は『本人自身』です。"},{"cat":"IDとセキュリティ","topic":"パスワードレス認証の方法","q":"パスワードレス認証の方法として適切なものはどれですか？","choices":["Windows Hello、FIDO2セキュリティキー、認証アプリ","長く複雑なパスワードの定期変更","パスワードと秘密の質問の組み合わせ","共有アカウントの利用"],"answer":0,"exp":"パスワードレス認証はWindows Hello・FIDO2キー・認証アプリ等でパスワード自体を使いません。複雑なパスワードや秘密の質問は依然パスワード方式です。"},{"cat":"IDとセキュリティ","topic":"Azureの外部IDの目的","q":"Microsoft Entra External ID（外部ID）の目的として正しいものはどれですか？","choices":["取引先や顧客など組織外ユーザーのアクセスを安全に管理する","社内の物理デバイスの在庫を管理する","Azureリソースのコストを集計する","仮想ネットワークを構成する"],"answer":0,"exp":"External IDはB2BゲストやB2C顧客など組織外ユーザーのアクセスを安全に管理します。コストやネットワークの管理機能ではありません。"},{"cat":"IDとセキュリティ","topic":"外部ユーザーのID管理","q":"B2Bコラボレーションで外部ユーザーを招待する場合の特徴として正しいものはどれですか？","choices":["ゲストは自身の既存のIDのまま招待を受けてアクセスできる","招待先が必ず新しい社内アカウントとパスワードを発行する","外部ユーザーには認証を課さずアクセスさせる","招待元はゲストのアクセス範囲を制御できない"],"answer":0,"exp":"B2Bではゲストは自分の組織のIDのままアクセスでき、招待元はアクセス範囲を制御できます。新規アカウント発行や無認証アクセスは不要・不適切です。"},{"cat":"IDとセキュリティ","topic":"条件付きアクセスのツール","q":"条件付きアクセス（Conditional Access）が評価するシグナルとして適切でないものはどれですか？","choices":["ユーザーやグループ","場所（IP）やデバイスの状態","アプリやサインインのリスクレベル","ストレージアカウントの冗長性レベル"],"answer":3,"exp":"条件付きアクセスはユーザー・場所・デバイス・アプリ・リスクなどを評価します。ストレージの冗長性はアクセス判断のシグナルではありません。"},{"cat":"IDとセキュリティ","topic":"条件付きアクセスの機能","q":"条件付きアクセスでできることとして正しいものはどれですか？","choices":["特定条件下でMFAを要求したりアクセスをブロックしたりする","リソースのコストを自動で削減する","保存データを暗号化する","DNSの名前解決を高速化する"],"answer":0,"exp":"条件付きアクセスは『if-then』のポリシーで、社外アクセス時のMFA要求やリスクの高いサインインのブロックなどを行います。コストや暗号化の機能ではありません。"},{"cat":"IDとセキュリティ","topic":"Azure RBACの使い方","q":"Azure RBAC（ロールベースアクセス制御）の割り当てを構成する3要素はどれですか？","choices":["セキュリティプリンシパル・ロール定義・スコープ","ユーザー名・パスワード・MFA","リージョン・ゾーン・サブネット","CPU・メモリ・ストレージ"],"answer":0,"exp":"RBACは『誰に（プリンシパル）・どの権限を（ロール定義）・どの範囲で（スコープ）』割り当ててアクセスを制御します。"},{"cat":"IDとセキュリティ","topic":"最小特権の原則","q":"最小特権の原則の説明として正しいものはどれですか？","choices":["業務に必要な最小限の権限のみを付与する","運用を円滑にするため全員に管理者権限を付与する","権限を一切付与せず誰もアクセスできなくする","権限を匿名化して誰の操作か分からなくする"],"answer":0,"exp":"最小特権は業務に必要な最小限の権限だけを与え、被害範囲を抑える考え方です。全員管理者や無権限化、匿名化は不適切です。"},{"cat":"IDとセキュリティ","topic":"ゼロトラストモデルの基本原則","q":"ゼロトラストの基本的な考え方として正しいものはどれですか？","choices":["『決して信頼せず、常に検証する』","社内ネットワークからのアクセスは常に信頼する","一度認証すれば以後の検証は省略する","境界のファイアウォールだけで内部を守る"],"answer":0,"exp":"ゼロトラストは内外を問わず暗黙の信頼を置かず、アクセスのたびに明示的に検証します。社内を無条件に信頼する従来型の境界防御とは異なります。"},{"cat":"IDとセキュリティ","topic":"ゼロトラストモデルの適用","q":"ゼロトラストの指針として適切でないものはどれですか？","choices":["明示的に検証する","最小特権アクセスを使う","侵害が起きていることを前提とする","社内からのアクセスは検証せず許可する"],"answer":3,"exp":"ゼロトラストの3原則は『明示的な検証』『最小特権』『侵害の想定』です。社内だから検証を省くという考え方はゼロトラストに反します。"},{"cat":"IDとセキュリティ","topic":"多層防御の目的とは","q":"多層防御（Defense in Depth）の目的として正しいものはどれですか？","choices":["複数の防御層を重ね、ある層が突破されても他の層で守る","単一の最強の防御層に資源を集中させる","防御を1層に統合して運用を単純化する","内部ネットワークの防御を省略する"],"answer":0,"exp":"多層防御は物理・ID・境界・ネットワーク・コンピューティング・アプリ・データの複数層で守り、単一障害点を作りません。単層集中とは逆の発想です。"},{"cat":"IDとセキュリティ","topic":"各防御層の役割","q":"多層防御における『データ層』の代表的な対策はどれですか？","choices":["保存データと転送データの暗号化、アクセス制御","建物の入退室管理と施錠","ネットワークのセグメンテーション","DDoS攻撃の緩和"],"answer":0,"exp":"データ層では暗号化やアクセス制御で最終的に守るべきデータを保護します。入退室は物理層、セグメンテーションはネットワーク層の対策です。"},{"cat":"IDとセキュリティ","topic":"Defender for Cloudの機能","q":"Microsoft Defender for Cloudの機能として正しいものはどれですか？","choices":["セキュリティ態勢の評価（セキュアスコア）と脅威保護を提供する","リソースのコストを見積もる","DNSゾーンをホストする","仮想マシンをオートスケールする"],"answer":0,"exp":"Defender for Cloudはセキュアスコアや推奨でセキュリティ態勢を評価し、脅威保護も提供します。コスト見積もりやスケールは別サービスです。"},{"cat":"IDとセキュリティ","topic":"Defender for Cloudのデプロイ","q":"Defender for Cloudが保護対象にできる環境として正しいものはどれですか？","choices":["Azureに加え、Arc等を通じてオンプレミスや他クラウドも対象にできる","Azureのリソースのみに限定される","オンプレミスのサーバーのみに限定される","ネットワーク機器のファームウェアのみ"],"answer":0,"exp":"Defender for CloudはArc等を通じてAzure・オンプレミス・他クラウド（AWS/GCP）を保護対象にできます。Azure限定ではありません。"},{"cat":"IDとセキュリティ","topic":"Azureの脅威検出機能","q":"Defender for Cloudの脅威検出に関する記述として正しいものはどれですか？","choices":["異常なアクティビティを検知してセキュリティアラートを生成する","検知した脅威を自動的に無視して負荷を下げる","アラートを出さずログのみ保存する","暗号鍵の生成のみを行う"],"answer":0,"exp":"Defender for Cloudは不審なサインインやマルウェア的挙動を検知し、調査・対応のためのアラートを生成します。脅威を無視したり鍵生成だけを行うものではありません。"},{"cat":"IDとセキュリティ","topic":"他のクラウドへの保護","q":"Defender for CloudでAWSやGCPのリソースを保護するために前提となるものはどれですか？","choices":["マルチクラウドのコネクタを構成して各アカウントを接続する","対象を一度Azureへ移行する必要がある","特別な設定なしに自動で他クラウドが保護される","他クラウドの保護は仕組み上できない"],"answer":0,"exp":"他クラウドの保護にはマルチクラウドコネクタを構成してAWS/GCPアカウントを接続します。移行は不要で、自動保護でもありません。"},{"cat":"管理とガバナンス","topic":"Azureのコストに影響を与える要因","q":"Azureのコストに影響を与える要因として適切でないものはどれですか？","choices":["リソースの種類とサイズ","リージョン（地域）による単価差","リージョンからの送信データ転送量","リソースに付けたタグの色やラベル名"],"answer":3,"exp":"コストはリソースの種類・サイズ・リージョン・課金モデル・データ転送量に左右されます。タグ名やラベル自体は課金額に影響しません。"},{"cat":"管理とガバナンス","topic":"Azureのコストに影響を与える要因","q":"一般的なデータ転送コストの説明として正しいものはどれですか？","choices":["多くの場合、受信（上り）は無料で、リージョンからの送信（下り）に課金される","受信（上り）に常に高額が課金され送信は無料である","データ転送はリージョンを問わず常に無料である","転送量に関わらず固定の月額が課金される"],"answer":0,"exp":"一般にAzureへの受信（上り）は無料で、リージョンからの送信（下り/egress）に課金されることが多いです。逆ではない点に注意です。"},{"cat":"管理とガバナンス","topic":"Azureのリソース管理","q":"Azureリソースを管理する手段として適切でないものはどれですか？","choices":["Azureポータル","Azure CLI / Azure PowerShell","ARM/Bicepテンプレート","料金計算ツール（Pricing Calculator）"],"answer":3,"exp":"リソース管理はポータル・CLI・PowerShell・テンプレート・REST APIで行います。Pricing Calculatorは事前見積もり用で、リソースの作成・構成はしません。"},{"cat":"管理とガバナンス","topic":"Azure Marketplaceの特性","q":"Azure Marketplaceの特性として正しいものはどれですか？","choices":["Microsoftやサードパーティの認定ソリューションを見つけて展開できるオンラインストア","物理サーバーを購入して自宅へ配送するサービス","コストを分析して削減提案を出すツール","脅威を検出してアラートを出すサービス"],"answer":0,"exp":"Marketplaceは認定済みソフトやサービスを検索・購入・デプロイできるストアです。コスト分析はCost Management、脅威検出はDefenderの役割です。"},{"cat":"管理とガバナンス","topic":"Azure計算ツールの目的","q":"Azure Pricing Calculator（料金計算ツール）の目的として正しいものはどれですか？","choices":["利用予定のサービス構成からコストを事前に見積もる","実際に発生した請求額を分析・可視化する","オンプレミスとAzureの総保有コストを比較する","リソースを実際にデプロイする"],"answer":0,"exp":"Pricing Calculatorは導入前のコスト概算を見積もるツールです。実績分析はCost Management、TCO比較はTCO計算ツール、デプロイはポータル等が担います。"},{"cat":"管理とガバナンス","topic":"TCO計算ツールの機能","q":"TCO（総保有コスト）計算ツールの機能として正しいものはどれですか？","choices":["オンプレミス運用とAzure移行のコストを比較し総保有コストの削減効果を推定する","利用予定サービスの月額を見積もるだけのツールである","実際の請求の内訳を可視化するツールである","脅威の検出結果をレポートするツールである"],"answer":0,"exp":"TCO計算ツールは現在のオンプレミスコストとAzure移行後を比較します。導入前見積もりはPricing Calculator、実績可視化はCost Managementと役割が異なります。"},{"cat":"管理とガバナンス","topic":"Azure Cost Managementの機能","q":"Microsoft Cost Management の機能として正しいものはどれですか？","choices":["実際のコストを分析・可視化し、予算やコストアラートを設定できる","導入前の概算見積もりだけを行う","オンプレミスとの総保有コストのみを比較する","セキュリティの脅威を検出する"],"answer":0,"exp":"Cost Managementは実績コストの可視化・分析、予算設定、アラート、最適化提案を行います。事前見積もりやTCO比較、脅威検出は別ツールです。"},{"cat":"管理とガバナンス","topic":"コストアラートの種類","q":"Cost Managementで設定できるアラートとして適切なものはどれですか？","choices":["予算に対する実績や予測支出がしきい値を超えた際の予算アラート","リソースのCPU使用率の監視アラート","サインインの失敗回数に基づくアラート","ストレージの読み取り遅延のアラート"],"answer":0,"exp":"Cost Managementでは予算に対する実績/予測超過を通知する予算アラート等を設定します。CPUや遅延の監視はAzure Monitor、サインインはEntra側の領域です。"},{"cat":"管理とガバナンス","topic":"クラウドリソース管理の方法","q":"Infrastructure as Code（コードによるインフラ管理）の利点として正しいものはどれですか？","choices":["環境を再現可能・一貫した形で自動デプロイでき、構成をバージョン管理できる","ポータルでの手作業を増やし柔軟性を高める","構成内容を文書として残せなくする","小規模環境専用で大規模には適用できない"],"answer":0,"exp":"IaCはテンプレートで構成をコード化し、再現性・一貫性のある自動デプロイとバージョン管理を可能にします。手作業中心や文書化不能は誤りです。"},{"cat":"管理とガバナンス","topic":"タグ付けの目的と効果","q":"Azureのタグ（Tags）の目的として正しいものはどれですか？","choices":["リソースにメタデータを付与し、整理・コスト配賦・検索を容易にする","リソースのCPU性能を向上させる","保存データを暗号化する","ネットワーク帯域を拡張する"],"answer":0,"exp":"タグは『キー：値』のメタデータで、部門やプロジェクト単位の整理・コスト配賦・検索を容易にします。性能や暗号化、帯域には影響しません。"},{"cat":"管理とガバナンス","topic":"タグ付けの目的と効果","q":"タグの活用例として最も適切なものはどれですか？","choices":["部門名のタグを付けてコストを部門別に集計・配賦する","タグでVMのメモリを動的に増やす","タグでデータを自動的に暗号化する","タグでリージョン間の通信を高速化する"],"answer":0,"exp":"例えば『Department: Sales』のタグを付けると、Cost Managementで部門別にコストを集計・配賦できます。性能や暗号化の効果はありません。"},{"cat":"管理とガバナンス","topic":"Microsoft Purviewの機能","q":"Microsoft Purviewの機能として正しいものはどれですか？","choices":["データの検出・分類・系統・ガバナンスとコンプライアンスを統合的に管理する","仮想マシンをオートスケールする","DNSゾーンをホストする","コストの概算を見積もる"],"answer":0,"exp":"Purviewはデータの検出・分類・系統（リネージ）・ガバナンス・コンプライアンスを統合管理します。スケールやDNS、見積もりは無関係です。"},{"cat":"管理とガバナンス","topic":"Microsoft Purviewのデータ管理","q":"Purviewが提供するデータ管理機能として適切なものはどれですか？","choices":["機密データの自動分類とデータカタログによる資産の可視化","暗号鍵の生成と保管のみ","ネットワークの名前解決","仮想マシンのパッチ適用"],"answer":0,"exp":"Purviewは機密情報の自動分類やデータカタログでデータ資産を可視化しガバナンスを支援します。鍵管理（Key Vault）や名前解決、パッチとは別です。"},{"cat":"管理とガバナンス","topic":"Azure Policyの機能","q":"Azure Policyの機能として正しいものはどれですか？","choices":["リソースが組織のルールに準拠しているかを評価し、非準拠を拒否・修復する","リソースへのアクセス権（ロール）を割り当てる","リソースを誤削除から保護するロックをかける","コストの実績を可視化する"],"answer":0,"exp":"Azure Policyはルールに基づきリソースの準拠状態を評価し、非準拠リソースの作成拒否や修復を行います。権限割り当てはRBAC、削除保護はロック、コスト可視化はCost Managementです。"},{"cat":"管理とガバナンス","topic":"Azure Policyでのポリシーとイニシアティブ","q":"イニシアティブ（Initiative）の説明として正しいものはどれですか？","choices":["複数のポリシー定義をまとめて一括で割り当てるグループ","単一のリソースに対する1つのアクセス権","リソースの削除を防ぐロックの設定","コストの予算アラートのまとまり"],"answer":0,"exp":"イニシアティブは関連する複数のポリシー定義を束ねたもので、まとめて割り当て・管理できます。アクセス権やロック、予算とは別概念です。"},{"cat":"管理とガバナンス","topic":"リソースロックの機能","q":"リソースロック（Resource Lock）の機能として正しいものはどれですか？","choices":["重要なリソースの誤った削除や変更を防止する","リソースへのアクセス権を細かく割り当てる","リソースの準拠状態をルールで評価する","リソースのコストを集計する"],"answer":0,"exp":"リソースロックは偶発的な削除・変更を防ぐ保護機能です。権限割り当てはRBAC、準拠評価はPolicy、コスト集計はCost Managementの役割です。"},{"cat":"管理とガバナンス","topic":"リソースロックの管理方法","q":"リソースロックの種類として正しい組み合わせはどれですか？","choices":["削除（CanNotDelete）と読み取り専用（ReadOnly）","読み取り（Read）と書き込み（Write）","所有者（Owner）と閲覧者（Reader）","作成（Create）と削除（Delete）"],"answer":0,"exp":"ロックは削除のみ防ぐ『CanNotDelete』と、変更・削除の両方を防ぐ『ReadOnly』の2種類です。OwnerやReaderはRBACロールで、混同に注意です。"},{"cat":"管理とガバナンス","topic":"Service Trust Portalの目的","q":"Microsoft Service Trust Portalの目的として正しいものはどれですか？","choices":["コンプライアンス認証や監査レポート、セキュリティ・プライバシー文書を提供する","Azureリソースを作成・構成する","リソースのコストを見積もる","DNSゾーンをホストする"],"answer":0,"exp":"Service Trust PortalはMicrosoftのコンプライアンス認証や監査レポート、セキュリティ関連文書を提供するポータルです。リソース操作やコスト、DNSの機能ではありません。"},{"cat":"管理とガバナンス","topic":"Service Trust Portalへのアクセス要件","q":"Service Trust Portalの一部の機密文書にアクセスする際の一般的な要件はどれですか？","choices":["組織アカウントでのサインインや契約条件への同意が求められる場合がある","物理的なセキュリティキーの郵送が必須である","Azureサポートプランの最上位契約が必須である","対象リージョンでVMを稼働させる必要がある"],"answer":0,"exp":"一部の監査レポート等の機密文書の閲覧には、組織アカウントでのサインインや条件への同意が必要な場合があります。キー郵送や最上位サポートは不要です。"},{"cat":"管理とガバナンス","topic":"Azure環境管理に必要なツール","q":"ブラウザーからGUIでAzureを統合的に管理する主要なツールはどれですか？","choices":["Azureポータル","Azure Policy","Azure Monitor","Azure Advisor"],"answer":0,"exp":"AzureポータルはブラウザーからのGUI統合管理コンソールです。Policyはガバナンス、Monitorは監視、Advisorは推奨提示と、それぞれ役割が異なります。"},{"cat":"管理とガバナンス","topic":"Azure Cloud Shellの特徴","q":"Azure Cloud Shellの特徴として正しいものはどれですか？","choices":["ブラウザー上で使えるBash/PowerShell対応のシェルで、CLI等がプリインストールされている","ローカルへのインストールが必須のデスクトップアプリである","GUIのみでコマンド実行はできない","Windowsからのみ利用できる"],"answer":0,"exp":"Cloud ShellはブラウザーからBash/PowerShellを利用でき、Azure CLI等がプリインストールされています。インストール不要で、OSを問わず使えます。"},{"cat":"管理とガバナンス","topic":"Azure Arcの機能について","q":"Azure Arcの機能として正しいものはどれですか？","choices":["オンプレミスや他クラウドのリソースをAzureの管理面に取り込み一元管理する","Azure内のVMのオートスケールのみを行う","DNSゾーンをホストする","コストの概算を見積もる"],"answer":0,"exp":"Arcはオンプレミスやマルチクラウドのサーバー・Kubernetes・データサービスをAzureの管理・ガバナンス基盤に統合します。スケールやDNS、見積もりは別機能です。"},{"cat":"管理とガバナンス","topic":"Azure Arcで管理可能なリソース","q":"Azure Arcで管理できる対象として適切でないものはどれですか？","choices":["オンプレミスの物理/仮想サーバー","Kubernetesクラスター","対応する一部のAzureデータサービス","利用者個人のスマートフォンの通話履歴"],"answer":3,"exp":"Arcはサーバー・Kubernetes・対応データサービス等を管理対象にできます。個人端末の通話履歴は管理対象ではありません。"},{"cat":"管理とガバナンス","topic":"Azure Resource Managerの機能","q":"Azure Resource Manager（ARM）の役割として正しいものはどれですか？","choices":["Azureリソースの作成・更新・削除を統括するデプロイ・管理レイヤー","リソースのコストを可視化するレイヤー","脅威を検出するセキュリティレイヤー","DNSを解決する名前解決レイヤー"],"answer":0,"exp":"ARMはすべてのリソース操作を受け付ける統合管理レイヤーで、テンプレートによる宣言的デプロイを支えます。コスト・脅威・DNSは別機能です。"},{"cat":"管理とガバナンス","topic":"ARMテンプレートの利点","q":"ARMテンプレートの利点として正しいものはどれですか？","choices":["JSONで宣言的にインフラを定義し、再現性のある自動デプロイができる","手作業のポータル操作を逐一記録するだけのものである","構成を再利用できず毎回作り直す必要がある","単一リソースのデプロイにしか使えない"],"answer":0,"exp":"ARMテンプレートはJSONで望ましい状態を宣言的に記述し、再現性ある自動デプロイと再利用を可能にします。手作業記録や単一限定ではありません。"},{"cat":"管理とガバナンス","topic":"Bicepの特徴","q":"Bicepの特徴として正しいものはどれですか？","choices":["ARMより簡潔で読みやすい構文のIaC言語で、最終的にARMに変換される","ARMとは無関係の独立したデプロイエンジンである","GUIのみで記述するノーコードツールである","コスト分析専用の言語である"],"answer":0,"exp":"BicepはARMテンプレートの抽象化で、簡潔な構文を持ちデプロイ時にARM JSONへ変換されます。ARMとは独立しておらず、コスト分析用でもありません。"},{"cat":"管理とガバナンス","topic":"Azure Advisorの機能","q":"Azure Advisorの機能として正しいものはどれですか？","choices":["コスト・セキュリティ・信頼性・パフォーマンス・運用の観点で推奨事項を提示する","リソースをデプロイして構成する","脅威を直接ブロックする","DNSゾーンをホストする"],"answer":0,"exp":"Advisorはベストプラクティスに基づき5つの観点で推奨を提示します。デプロイや脅威の直接ブロック（Defender）、DNSは別の役割です。"},{"cat":"管理とガバナンス","topic":"Azure Advisorのレコメンデーション","q":"Azure Advisorのレコメンデーションの例として適切なものはどれですか？","choices":["使用率の低いVMのサイズ変更によるコスト削減提案","DNSレコードの自動作成","保存データの暗号鍵の生成","予算アラートの請求書発行"],"answer":0,"exp":"Advisorは例えば低使用率VMのサイズ変更といったコスト削減や最適化の推奨を提示します。DNSや鍵生成、請求書発行は対象外です。"},{"cat":"管理とガバナンス","topic":"Azure Service Healthの構成","q":"Azure Service Healthが提供する情報として適切なものはどれですか？","choices":["サービスの問題・計画メンテナンス・正常性アドバイザリ","リソースごとのコストの内訳","RBACロールの割り当て一覧","ストレージの冗長性レベルの設定"],"answer":0,"exp":"Service Healthは利用中のサービスに影響する問題・計画メンテ・アドバイザリを提供します。コストやRBAC、冗長性設定は別サービスの領域です。"},{"cat":"管理とガバナンス","topic":"Resource Healthの役割","q":"Azure Resource Healthの役割として正しいものはどれですか？","choices":["個々のリソースの現在の正常性状態と過去の履歴を示す","Azure全体のサービス障害の広報を行う","リソースのコストを集計する","リソースのアクセス権を割り当てる"],"answer":0,"exp":"Resource Healthは特定リソースが正常か劣化/利用不可かを表示します。Azure全体のサービス状況はService Health、権限はRBACの領域です。"},{"cat":"管理とガバナンス","topic":"Azure Monitorの範囲","q":"Azure Monitorの範囲として正しいものはどれですか？","choices":["メトリックやログを収集・分析し、可視化・アラート・自動対応を行う","リソースの準拠状態をルールで評価する","リソースの誤削除を防ぐロックをかける","コンプライアンス監査レポートを配布する"],"answer":0,"exp":"Azure Monitorはメトリック/ログを収集・分析し可視化・アラート・自動対応を提供します。準拠評価はPolicy、削除防止はロック、監査文書はService Trust Portalです。"},{"cat":"管理とガバナンス","topic":"Azure Monitorアラートの機能","q":"Azure Monitorのアラート機能として正しいものはどれですか？","choices":["メトリックやログが条件を満たした際に通知やアクションを起動する","予算超過時にコストの請求を停止する","リソースを自動的に削除して整理する","RBACロールを自動で付与する"],"answer":0,"exp":"Monitorのアラートは条件成立時にアクショングループ経由で通知や自動アクションを起動します。請求停止やリソース削除、ロール付与は行いません。"},{"cat": "シナリオ演習（本番形式）", "topic": "コンピューティング", "q": "あなたは、社内向けWebアプリケーションをAzureに移行する予定です。OSへのパッチ適用やサーバー管理の手間をできるだけ減らしたいと考えています。最も適したサービスはどれですか？", "choices": ["Azure Virtual Machines", "Azure App Service", "Azure Container Instances", "Azure Virtual Desktop"], "answer": 1, "exp": "OSやインフラの管理をMicrosoftに任せられるPaaSのApp Serviceが最適です。Virtual MachinesはIaaSで管理の手間が大きく、Virtual Desktopはデスクトップ仮想化用です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コンピューティング", "q": "あなたは、ファイルがアップロードされたときだけ画像変換処理を実行したいと考えています。処理が行われていない間は料金を発生させたくありません。最も適したサービスはどれですか？", "choices": ["Azure Functions", "Azure Virtual Machines", "Azure App Service", "Azure Kubernetes Service"], "answer": 0, "exp": "イベント駆動で実行され待機中は課金されないサーバーレスのAzure Functionsが最適です。VMやAKSは常時稼働分の費用がかかります。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ネットワーク", "q": "あなたは、オンプレミスのデータセンターとAzureを、公衆インターネットを経由しない専用接続で結び、安定した低遅延・高帯域を確保したいと考えています。最も適したサービスはどれですか？", "choices": ["VPN Gateway", "Azure ExpressRoute", "Azure DNS", "Azure Firewall"], "answer": 1, "exp": "ExpressRouteは接続プロバイダー経由で公衆インターネットを通らない専用接続を提供し、低遅延・高帯域・高信頼が得やすいです。VPN Gatewayはインターネット経由の暗号化接続です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ネットワーク", "q": "あなたは、小規模拠点とAzureを、専用線を引かずにインターネット経由で素早く安価に暗号化接続したいと考えています。最も適したサービスはどれですか？", "choices": ["Azure ExpressRoute", "VPN Gateway", "Azure Bastion", "Azure Load Balancer"], "answer": 1, "exp": "インターネット上に暗号化トンネルを張るVPN Gatewayが適します。ExpressRouteは専用線で高品質ですが導入コスト・期間がかかります。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ストレージ", "q": "あなたは、Webアプリケーションからユーザーがアップロードする大量の画像や動画を保存・配信したいと考えています。最も適したストレージはどれですか？", "choices": ["Azure Files", "Azure Blob Storage", "Azure Queue Storage", "Azure Table Storage"], "answer": 1, "exp": "非構造化データ(画像・動画)の保存・配信にはBlob Storageが最適です。FilesはSMB/NFSのファイル共有、Queueはメッセージング用で用途が異なります。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ストレージ", "q": "あなたは、既存アプリが利用するファイル共有をクラウドに移し、複数のVMから同時にドライブとしてマウントして使いたいと考えています。最も適したサービスはどれですか？", "choices": ["Azure Blob Storage", "Azure Files", "Azure Disk Storage", "Azure Data Lake Storage"], "answer": 1, "exp": "SMB/NFSでマウントでき複数マシンから共有できるAzure Filesが適します。Blobはオブジェクトストレージでマウント用途には向きません。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ストレージ", "q": "あなたは、リージョン全体に影響する災害が起きてもデータを失わないよう、地理的に離れた別リージョンにもデータを複製したいと考えています。最も適した冗長性オプションはどれですか？", "choices": ["LRS（ローカル冗長ストレージ）", "ZRS（ゾーン冗長ストレージ）", "GRS（地理冗長ストレージ）", "単一コピーのみ保持"], "answer": 2, "exp": "別リージョンへも複製し広域災害に備えるのはGRSです。LRSは単一データセンター内、ZRSは同一リージョン内の複数ゾーンに留まります。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ID・セキュリティ", "q": "あなたは、Kerberosやグループポリシーに依存するレガシーアプリをAzureのVMに移行しますが、ドメインコントローラーの構築・運用は自分で行いたくありません。最も適したサービスはどれですか？", "choices": ["Microsoft Entra ID", "Microsoft Entra Domain Services", "Microsoft Entra Connect", "Azure RBAC"], "answer": 1, "exp": "ドメイン参加・グループポリシー・Kerberos等のAD互換機能を、DC運用なしのマネージドで提供するのがEntra Domain Servicesです。Entra IDはモダンなクラウドIDで従来のAD機能とは異なります。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ID・セキュリティ", "q": "あなたは、社内ネットワークからのサインインではMFAを省略し、社外や未知の場所からのサインイン時にのみMFAを要求したいと考えています。最も適した機能はどれですか？", "choices": ["Azure RBAC", "条件付きアクセス", "リソースロック", "Azure Policy"], "answer": 1, "exp": "場所やデバイスなどの条件に応じてアクセスを制御し、必要なときだけMFAを要求できるのは条件付きアクセスです。RBACは権限割り当て、Policyはリソース構成の統制です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ID・セキュリティ", "q": "あなたは、利用者一人ひとりに個別設定するのではなく、「閲覧者」「共同作成者」などの役割単位でAzureリソースへのアクセス権をまとめて割り当てたいと考えています。最も適した仕組みはどれですか？", "choices": ["Azure Policy", "Azure RBAC（ロールベースアクセス制御）", "条件付きアクセス", "多層防御"], "answer": 1, "exp": "役割(ロール)単位で権限を割り当てるのはAzure RBACです。Policyはリソースの構成ルールの強制で、誰がアクセスできるか(RBAC)とは別の軸です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コスト管理", "q": "あなたは、オンプレミスでの運用を継続した場合と、Azureへ移行した場合のコストを比較し、移行による削減効果を経営層に説明したいと考えています。最も適したツールはどれですか？", "choices": ["料金計算ツール（Pricing Calculator）", "TCO計算ツール（総保有コスト計算ツール）", "Microsoft Cost Management", "Azure Advisor"], "answer": 1, "exp": "オンプレミスとAzureのコストを比較し移行効果を見積もるのはTCO計算ツールです。料金計算ツールはAzureサービス単体の料金見積もり用です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コスト管理", "q": "あなたは、まだデプロイしていないAzure構成について、毎月どれくらいの料金がかかるかを事前に見積もりたいと考えています。最も適したツールはどれですか？", "choices": ["TCO計算ツール", "料金計算ツール（Pricing Calculator）", "Microsoft Cost Management", "Azure Monitor"], "answer": 1, "exp": "デプロイ前にAzureサービスの料金を見積もるのは料金計算ツールです。Cost Managementは利用開始後の実コスト管理、TCOはオンプレとの比較用です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コスト管理", "q": "あなたは、現在発生しているAzureの利用料金を分析し、支出が設定した予算に近づいたら通知を受け取りたいと考えています。最も適した機能はどれですか？", "choices": ["料金計算ツール", "Microsoft Cost Management（予算とアラート）", "TCO計算ツール", "Service Trust Portal"], "answer": 1, "exp": "利用開始後の実コストの分析・予算設定・アラートはMicrosoft Cost Managementの役割です。計算ツール類は事前の見積もり用です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ガバナンス", "q": "あなたは、組織のすべてのリソースに「コストセンター」タグを必須にし、タグが付いていないリソースは作成できないように強制したいと考えています。最も適したサービスはどれですか？", "choices": ["リソースロック", "Azure Policy", "Azure RBAC", "Microsoft Purview"], "answer": 1, "exp": "リソースの構成ルールを強制し違反する作成を拒否できるのはAzure Policyです。ロックは削除・変更の防止、RBACは権限管理で目的が異なります。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ガバナンス", "q": "あなたは、本番環境の重要なリソースを、削除権限を持つ管理者であっても誤って削除できないように保護したいと考えています。最も適した機能はどれですか？", "choices": ["削除ロック（CanNotDelete）", "Azure Policy", "タグ", "条件付きアクセス"], "answer": 0, "exp": "権限を持つユーザーでも削除を防げるのは削除ロック(CanNotDelete)です。ロックはRBACの権限よりも優先して操作を止めます。"}, {"cat": "シナリオ演習（本番形式）", "topic": "監視・ツール", "q": "あなたは、自分のリソースの構成を分析してもらい、コスト・セキュリティ・信頼性・パフォーマンスの観点で改善の推奨を受け取りたいと考えています。最も適したサービスはどれですか？", "choices": ["Azure Service Health", "Azure Advisor", "Azure Monitor", "Microsoft Defender for Cloud"], "answer": 1, "exp": "リソースを分析し各観点の改善推奨を出すのはAzure Advisorです。Service HealthはAzure側の障害情報、Monitorはメトリック/ログ監視です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "監視・ツール", "q": "あなたは、自分が使用しているリージョンで進行中のAzureサービス障害や、今後予定されている計画メンテナンスの通知を受け取りたいと考えています。最も適したサービスはどれですか？", "choices": ["Azure Monitor", "Azure Service Health", "Azure Advisor", "Azure Policy"], "answer": 1, "exp": "Azure側の障害・計画メンテナンス・正常性に関する通知を、自分の利用範囲に絞って提供するのはAzure Service Healthです。"}, {"cat": "シナリオ演習（本番形式）", "topic": "監視・ツール", "q": "あなたは、仮想マシンのメトリックやログを収集し、CPU使用率が一定の閾値を超えたらアラートを受け取りたいと考えています。最も適したサービスはどれですか？", "choices": ["Azure Advisor", "Azure Service Health", "Azure Monitor", "Microsoft Purview"], "answer": 2, "exp": "リソースからメトリックやログを収集・分析し、条件に応じてアラートを出すのはAzure Monitorです。"}, {"cat": "シナリオ演習（本番形式）", "topic": "クラウド概念", "q": "あなたは、サーバーやOSの管理を一切行わず、すでに完成しているソフトウェア（例：メールサービス）をそのまま利用したいと考えています。最も適したサービスモデルはどれですか？", "choices": ["IaaS", "PaaS", "SaaS", "オンプレミス"], "answer": 2, "exp": "完成済みのソフトをそのまま使い、利用者の管理が最小になるのはSaaSです。IaaSは管理が最大、PaaSはアプリ開発の土台を提供します。"}, {"cat": "シナリオ演習（本番形式）", "topic": "監視・ツール", "q": "あなたは、自分のPCに何もインストールせず、ブラウザからコマンド（BashまたはPowerShell）でAzureを操作したいと考えています。最も適したツールはどれですか？", "choices": ["Azure CLI（ローカルインストール）", "Azure Cloud Shell", "Azure PowerShell（ローカルインストール）", "ARMテンプレート"], "answer": 1, "exp": "インストール不要でブラウザから使えるシェルはAzure Cloud Shellです。CLIやPowerShellをローカルに入れる方法と対比されます。"}, {"cat": "シナリオ演習（本番形式）", "topic": "監視・ツール", "q": "あなたは、オンプレミスや他社クラウドにあるサーバーを、Azureの管理ツール（ポリシーやRBACなど）で一元的に管理したいと考えています。最も適したサービスはどれですか？", "choices": ["Azure Arc", "Azure Resource Manager", "Azure Migrate", "Azure Bastion"], "answer": 0, "exp": "Azure外のリソースをAzureの仕組みで一元管理できるのはAzure Arcです。Migrateは移行、Resource Managerはデプロイ・管理の基盤層です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コンピューティング", "q": "【目標】1か所のデータセンターで障害が発生してもサービスを継続できるようにしたい。【解決策】複数の可用性ゾーンにまたがって仮想マシンを配置する。この解決策で目標を達成できますか？", "choices": ["はい、達成できる", "いいえ、達成できない"], "answer": 0, "exp": "可用性ゾーンは同一リージョン内の物理的に分離されたデータセンターです。複数ゾーンに分散すれば、1つのデータセンター障害でもサービスを継続できます。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ストレージ", "q": "【目標】リージョン全体に及ぶ災害が起きてもデータを保全したい。【解決策】ローカル冗長ストレージ（LRS）を使用する。この解決策で目標を達成できますか？", "choices": ["はい、達成できる", "いいえ、達成できない"], "answer": 1, "exp": "LRSは単一データセンター内での複製にとどまり、リージョン災害には対応できません。広域災害に備えるにはGRSなど別リージョンへの複製が必要です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ID・セキュリティ", "q": "【目標】パスワードが漏洩しても、不正なサインインを防ぎたい。【解決策】多要素認証（MFA）を有効にする。この解決策で目標を達成できますか？", "choices": ["はい、達成できる", "いいえ、達成できない"], "answer": 0, "exp": "MFAはパスワードに加えて別の要素（スマホ承認など）を要求するため、パスワードが漏れても追加要素がなければサインインを防げます。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コンピューティング", "q": "【目標】需要に応じて、同じ構成の仮想マシンを自動的に増減させたい。【解決策】仮想マシンスケールセットを使用する。この解決策で目標を達成できますか？", "choices": ["はい、達成できる", "いいえ、達成できない"], "answer": 0, "exp": "仮想マシンスケールセットは、同一構成のVMを需要に応じて自動的に増減（オートスケール）できます。目標に合致します。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ガバナンス", "q": "【目標】読み取りは許可するが、リソースの変更も削除も一切できないように保護したい。【解決策】削除ロック（CanNotDelete）を設定する。この解決策で目標を達成できますか？", "choices": ["はい、達成できる", "いいえ、達成できない"], "answer": 1, "exp": "削除ロックは削除を防ぎますが、変更（書き込み）は可能です。変更も削除も防ぎたい場合は読み取り専用ロック（ReadOnly）が必要です。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コンピューティング", "q": "あなたは、アプリケーションをコンテナーとして実行・管理したいと考えています。利用できるサービスを2つ選択してください。", "choices": ["Azure Virtual Machines", "Azure Virtual Desktop", "Azure Container Instances", "Azure Functions", "Azure Kubernetes Service（AKS）"], "multi": true, "answers": [2, 4], "exp": "コンテナーの実行・管理にはAzure Container Instances（ACI）とAzure Kubernetes Service（AKS）が利用できます。VMやVirtual Desktop、Functionsはコンテナー管理サービスではありません。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ID・セキュリティ", "q": "あなたは、パスワードを使わない認証（パスワードレス認証）を導入したいと考えています。適切な方法を2つ選択してください。", "choices": ["Windows Hello for Business", "ユーザー名のみでのサインイン", "秘密の質問", "FIDO2セキュリティキー", "パスワードの定期変更"], "multi": true, "answers": [0, 3], "exp": "パスワードレス認証の代表例はWindows Hello for BusinessとFIDO2セキュリティキーです。秘密の質問やパスワードの変更は知識・パスワードに依存しており、パスワードレスではありません。"}, {"cat": "シナリオ演習（本番形式）", "topic": "コスト管理", "q": "あなたは、Azureの利用料金に影響する要因を把握したいと考えています。コストに影響する要因として正しいものを2つ選択してください。", "choices": ["Azureへ受信するデータ転送量", "リソースを配置するリージョン（地域）", "Azureから送信（外部へ転送）するデータ量", "サブスクリプションの名前", "リソースグループの数"], "multi": true, "answers": [1, 2], "exp": "コストはリージョンや、Azureから外部へ送信するデータ転送量（egress）に影響されます。受信データは通常無料で、サブスクリプション名やリソースグループの数自体は課金要因ではありません。"}, {"cat": "シナリオ演習（本番形式）", "topic": "ガバナンス", "q": "あなたは、リソースを誤操作から保護するためにリソースロックを使いたいと考えています。リソースロックの種類を2つ選択してください。", "choices": ["削除ロック（CanNotDelete）", "読み取り専用ロック（ReadOnly）", "書き込み専用ロック", "移動ロック", "タグロック"], "multi": true, "answers": [0, 1], "exp": "リソースロックには削除ロック（CanNotDelete）と読み取り専用ロック（ReadOnly）の2種類があります。書き込み専用・移動・タグロックという種類は存在しません。"},{"cat": "アーキテクチャとサービス", "topic": "データベース", "q": "Azureで、世界中に分散して低遅延で複製できる、フルマネージドのNoSQLデータベースはどれですか？", "choices": ["Azure SQL Database", "Azure Cosmos DB", "Azure Blob Storage", "Azure Table Storage"], "answer": 1, "exp": "Azure Cosmos DB＝グローバルに分散できるマネージドのNoSQLデータベース。Azure SQL Databaseはリレーショナル、Blob/Tableはストレージサービス。"}, {"cat": "アーキテクチャとサービス", "topic": "データベース", "q": "既存のSQL Serverデータベースを、できるだけ互換性を保ったままマネージドサービスとしてAzureに移行したいです。最適なサービスはどれですか？", "choices": ["Azure Cosmos DB", "Azure SQL Database", "Azure SQL Managed Instance", "Azure Files"], "answer": 2, "exp": "Azure SQL Managed InstanceはSQL Serverとの互換性が高く、既存のSQL Serverの移行に向く。"}, {"cat": "アーキテクチャとサービス", "topic": "データベース", "q": "Azure SQL Database の説明として正しいものはどれですか？", "choices": ["利用者がOSとSQL Serverを自分でインストール・管理する", "サーバー管理不要のフルマネージドなリレーショナルデータベース", "画像や動画など非構造化データ向けのストレージ", "メッセージを非同期にやり取りするためのキュー"], "answer": 1, "exp": "Azure SQL Database＝フルマネージドのリレーショナルデータベース（PaaS）。OSやSQL Serverの管理はMicrosoftが行う。"}, {"cat": "アーキテクチャとサービス", "topic": "データベース", "q": "AZ-900の観点で、Azureの『マネージドデータベースサービス』に含まれるものはどれですか？", "choices": ["Azure Blob Storage", "Azure Cosmos DB", "Azure Files", "Azure Queue Storage"], "answer": 1, "exp": "マネージドDBサービスにはCosmos DB、Azure SQL Database、SQL Managed Instanceなどが含まれる。Blob/Files/Queueはストレージサービス。"}, {"cat": "アーキテクチャとサービス", "topic": "コンピューティング", "q": "オーケストレーションなしで、単一のコンテナーを最も手軽に素早く実行したいです。最適なサービスはどれですか？", "choices": ["Azure Kubernetes Service（AKS）", "Azure Container Instances（ACI）", "Azure App Service", "Azure Functions"], "answer": 1, "exp": "ACIは単一/少数のコンテナーを手軽に実行できる。AKSは多数のコンテナーをオーケストレーション（自動管理）する用途。"}, {"cat": "アーキテクチャとサービス", "topic": "コンピューティング", "q": "ユーザーがどの端末からでもアクセスできるよう、Windowsのデスクトップやアプリをクラウド上で仮想化したいです。最適なサービスはどれですか？", "choices": ["Azure Virtual Machines", "Azure Virtual Desktop", "Azure App Service", "Azure Functions"], "answer": 1, "exp": "Azure Virtual Desktop（AVD）＝デスクトップ/アプリの仮想化。どの端末からでも同じデスクトップ環境にアクセスできる。"}, {"cat": "アーキテクチャとサービス", "topic": "ストレージ", "q": "アプリ間でメッセージを一時的に貯めて、非同期にやり取りしたいです。最適なストレージサービスはどれですか？", "choices": ["Blob Storage", "Queue Storage", "Table Storage", "Disk Storage"], "answer": 1, "exp": "Queue Storage＝メッセージを貯めてアプリ間で非同期にやり取りするためのストレージ。"}, {"cat": "アーキテクチャとサービス", "topic": "ストレージ", "q": "めったにアクセスしないが長期保存が必要なデータを、最も低コストで保管したいです。最適なアクセス層はどれですか？", "choices": ["ホットアクセス層", "クールアクセス層", "アーカイブアクセス層", "プレミアム層"], "answer": 2, "exp": "アーカイブ層は最も安価だが取り出しに時間がかかる。めったに使わない長期保存に向く。"}, {"cat": "アーキテクチャとサービス", "topic": "ストレージ", "q": "仮想マシンに接続して、OSやデータの保存先となる『仮想的なハードディスク』に当たるのはどれですか？", "choices": ["Blob Storage", "Azure Files", "Disk Storage（マネージドディスク）", "Queue Storage"], "answer": 2, "exp": "Disk Storage（マネージドディスク）＝VMにアタッチして使うブロックストレージ。物理PCのSSD/HDDに相当。"}, {"cat": "アーキテクチャとサービス", "topic": "ネットワーク", "q": "1つの仮想ネットワーク（VNet）を、用途ごとに区切る小さな区画を何と呼びますか？", "choices": ["ピアリング", "サブネット", "リソースグループ", "リージョン"], "answer": 1, "exp": "サブネット＝VNet内を用途別に区切る区画。"}, {"cat": "アーキテクチャとサービス", "topic": "ネットワーク", "q": "2つの仮想ネットワーク（VNet）同士を接続し、相互に通信できるようにする仕組みはどれですか？", "choices": ["VNetピアリング", "VPN Gateway", "ExpressRoute", "サブネット"], "answer": 0, "exp": "VNetピアリング＝VNet同士を接続する仕組み。VPN Gateway/ExpressRouteはオンプレとの接続用。"}, {"cat": "管理とガバナンス", "topic": "ツール", "q": "コマンドでAzureを操作・自動化できる、クロスプラットフォームのコマンドラインツールはどれですか？", "choices": ["Azureポータル", "Azure CLI", "ARMテンプレート", "Azure Advisor"], "answer": 1, "exp": "Azure CLI＝コマンドでAzureを操作するクロスプラットフォームのツール。ポータルはGUI操作。"},{"cat": "IDとセキュリティ", "topic": "Key Vault", "q": "アプリケーションが使うパスワードやAPIキー、暗号化キー、証明書などの機密情報を、安全に一元管理したいです。最適なサービスはどれですか？", "choices": ["Microsoft Defender for Cloud", "Azure Key Vault", "Azure Policy", "Azure RBAC"], "answer": 1, "exp": "Azure Key Vault＝シークレット・キー・証明書を安全に保管・管理するサービス。アプリに機密情報を直書きせず、ここから安全に取得して使う。Defender for Cloudはセキュリティ態勢の監視、Policyは構成統制、RBACはアクセス権管理で目的が異なる。"},{"cat": "管理とガバナンス", "topic": "監視", "q": "稼働中のWebアプリケーションのパフォーマンス、応答時間、エラー、利用状況を監視・分析したいです。最適なサービスはどれですか？", "choices": ["Azure Advisor", "Azure Application Insights", "Azure Service Health", "Azure Policy"], "answer": 1, "exp": "Azure Application Insights＝Azure Monitorの一機能で、アプリのパフォーマンス・可用性・エラー・利用状況を監視するAPMサービス。Advisorは改善推奨、Service HealthはAzure側の障害情報、Policyは構成統制で目的が異なる。"},{"cat": "クラウドの概念", "topic": "SLA", "q": "サービスレベルアグリーメント（SLA）の説明として正しいものはどれですか？", "choices": ["利用者がMicrosoftに支払う月額料金のこと", "Microsoftが保証する可用性やパフォーマンスの公式な合意で、未達時はサービスクレジットが適用される", "リソースの作成を制限するポリシー", "データを別リージョンに複製する仕組み"], "answer": 1, "exp": "SLAはMicrosoftが各サービスの可用性等を保証する公式な合意。基準を満たせない場合はサービスクレジット（返金等）が適用される。無料/プレビューサービスにはSLAが無いことが多い。"}, {"cat": "クラウドの概念", "topic": "SLA", "q": "それぞれSLAが99.9%の2つのAzureサービスを、両方が正常に動作する必要がある構成（直列）で組み合わせました。システム全体のSLA（合成SLA）はどうなりますか？", "choices": ["99.9%のまま変わらない", "99.9%より高くなる", "99.9%より低くなる", "SLAは適用されなくなる"], "answer": 2, "exp": "直列に依存する構成では合成SLAは各SLAの掛け算（99.9%×99.9%≈99.8%）になり、単体より低くなる。依存するサービスを増やすほど全体の保証値は下がる点に注意。"}];
const GLOSSARY = [{"cat":"クラウドの概念","term":"クラウドコンピューティング","def":"インターネット経由で、サーバー・ストレージ・データベース・ネットワークなどのITリソースをオンデマンドで利用する形態。必要なときに必要なだけ使い、使った分だけ支払う。","analogy":"電気を自宅で発電せず、コンセントから必要な分だけ使って使用量に応じて払うのと同じ。発電所＝クラウド、コンセント＝インターネット。"},{"cat":"クラウドの概念","term":"消費ベース（従量課金）モデル","def":"実際に使用したリソース量に応じて課金される料金体系。事前の大量購入が不要で、無駄なコストを避けられる。","analogy":"水道料金のイメージ。蛇口をひねった分だけ請求され、使わなければ料金は増えない。"},{"cat":"クラウドの概念","term":"弾力性（エラスティシティ）","def":"需要の変動に応じてリソースを自動的に増減させる能力。アクセス急増時は拡張し、落ち着けば縮小する。","analogy":"伸び縮みするゴムバンドのよう。荷物（負荷）が増えれば伸び、減れば自然に元に戻る。"},{"cat":"クラウドの概念","term":"スケールアップ（垂直スケーリング）","def":"既存のサーバー1台のCPUやメモリなどの性能を増強して処理能力を上げる方法。","analogy":"非力なエンジンを、より強力なエンジンに載せ替えるイメージ。車は1台のまま中身を強くする。"},{"cat":"クラウドの概念","term":"スケールアウト（水平スケーリング）","def":"同じ構成のサーバーの台数を増やして負荷を分散し、全体の処理能力を上げる方法。","analogy":"レジ1台に行列ができたら、同じレジをもう何台か開けて客をさばくイメージ。"},{"cat":"クラウドの概念","term":"責任共有モデル","def":"クラウドのセキュリティ責任を、プロバイダーと利用者で分担する考え方。物理層はプロバイダー、データやIDは常に利用者の責任。","analogy":"賃貸マンション。建物や鍵の仕組み（物理・基盤）は大家、部屋の中の貴重品管理（データ・ID）は住人の責任。"},{"cat":"クラウドの概念","term":"IaaS（サービスとしてのインフラ）","def":"仮想マシン・ストレージ・ネットワークなどの基盤をサービスとして借りる形態。OS以上は利用者が管理し自由度が高い。","analogy":"更地と建材を借りて自分で家を建てるイメージ。土地（インフラ）は借り物だが、間取りや内装は自分次第。"},{"cat":"クラウドの概念","term":"PaaS（サービスとしてのプラットフォーム）","def":"OSやランタイムまでをプロバイダーが管理し、利用者はアプリのコードやデータに集中できる形態。","analogy":"キッチン付きのレンタルスペース。調理器具（基盤）は用意済みで、自分は料理（アプリ）に専念できる。"},{"cat":"クラウドの概念","term":"SaaS（サービスとしてのソフトウェア）","def":"完成したソフトウェアをインターネット経由で利用する形態。利用者は設定とデータのみを管理する。","analogy":"出来合いの料理をデリバリーで頼むイメージ。調理は一切せず、食べる（使う）だけ。"},{"cat":"クラウドの概念","term":"パブリッククラウド","def":"プロバイダーが所有・運用するインフラを、複数の組織が共有して利用する形態。","analogy":"公共のジム。設備はジムの所有で、多くの会員が共用する。"},{"cat":"クラウドの概念","term":"プライベートクラウド","def":"単一の組織が専有するクラウド環境。社内データセンターやホスト型で運用され、制御性が高い。","analogy":"自宅のホームジム。自分専用で誰とも共有しないが、設備の用意・維持は自分持ち。"},{"cat":"クラウドの概念","term":"ハイブリッドクラウド","def":"オンプレミス（プライベート）とパブリッククラウドを組み合わせ、相互に連携させる構成。","analogy":"在宅勤務とオフィス出社を使い分ける働き方。状況に応じて最適な場所で作業する。"},{"cat":"クラウドの概念","term":"マルチクラウド","def":"複数のパブリッククラウドを併用する形態。ベンダーロックイン回避や各社の得意分野の使い分けが目的。","analogy":"用途ごとに複数の銀行口座を使い分けるイメージ。1行に依存せずリスクを分散する。"},{"cat":"クラウドの概念","term":"CapEx（資本的支出）","def":"サーバーや設備など資産を前もって購入する初期投資型の支出。","analogy":"マイカーを一括購入するイメージ。最初に大きなお金を払って資産を持つ。"},{"cat":"クラウドの概念","term":"OpEx（運用的支出）","def":"使った分を継続的に経費として支払う運用型の支出。クラウドの従量課金が該当。","analogy":"カーシェアの利用料金。使った時間だけ払い、車という資産は持たない。"},{"cat":"クラウドの概念","term":"高可用性（High Availability）","def":"障害が起きてもダウンタイムを最小化し、サービスを継続できるよう冗長化された特性。","analogy":"飛行機のエンジンが複数あるのと同じ。1基止まっても残りで飛び続けられる。"},{"cat":"クラウドの概念","term":"スケーラビリティ","def":"需要に応じてリソースを増減し、必要な性能を保ちつつコストを最適化できる能力。","analogy":"宴会の人数に合わせてテーブルを足したり減らしたりするイメージ。"},{"cat":"クラウドの概念","term":"信頼性（Reliability）","def":"障害から回復し、サービスを継続して提供できる能力。リージョンやゾーンへの分散で高める。","analogy":"複数の道を知っている運転手。1本が通行止めでも別ルートで目的地に着ける。"},{"cat":"クラウドの概念","term":"ガバナンス","def":"ポリシーやルールを定義し、リソースが組織の基準に準拠しているか統制・監査する仕組み。","analogy":"会社の就業規則。全員が守るべきルールを決め、逸脱がないか確認する。"},{"cat":"クラウドの概念","term":"多層防御（Defense in Depth）","def":"物理・ID・境界・ネットワーク・アプリ・データなど複数の層で守り、単一障害点を作らない考え方。","analogy":"城の防御。堀・城壁・門・天守と何重もの守りで、1つ破られても次の層で食い止める。"},{"cat":"クラウドの概念","term":"最小特権の原則","def":"ユーザーやサービスに、業務に必要な最小限の権限だけを与え、被害範囲を抑える考え方。","analogy":"ホテルのカードキー。客室の鍵は自分の部屋だけ開けられ、他人の部屋やバックヤードには入れない。"},{"cat":"クラウドの概念","term":"ゼロトラスト","def":"ネットワークの内外を問わず暗黙の信頼を置かず、アクセスのたびに明示的に検証するセキュリティモデル。","analogy":"顔見知りでも毎回身分証を確認する厳格な受付。『社内の人だから』では通さない。"},{"cat":"アーキテクチャとサービス","term":"リージョン","def":"Azureのデータセンターが集まった地理的な領域。ユーザーへの近さやデータ所在地の規制に応じて選ぶ。","analogy":"全国チェーン店の『地域ごとの拠点』。近くの店舗を使うほど早く届く（遅延が小さい）。"},{"cat":"アーキテクチャとサービス","term":"可用性ゾーン","def":"1つのリージョン内にある、電源・冷却・ネットワークが独立した物理的に分離されたデータセンター。ゾーン障害から保護する。","analogy":"同じ街にある複数の独立した倉庫。1棟が停電しても、別棟は別電源で稼働を続ける。"},{"cat":"アーキテクチャとサービス","term":"リージョンペア","def":"同一地理内で数百km離れた2つのリージョンが対になったもの。広域災害時の復旧や更新の順次適用に使う。","analogy":"離れた支社に置く相互バックアップ。本社が被災しても遠方の支社が業務を引き継げる。"},{"cat":"アーキテクチャとサービス","term":"サブスクリプション","def":"Azureリソースの課金とアクセスを束ねる論理的な単位。部門や環境ごとに分けて管理できる。","analogy":"会社の部門別の経費アカウント。部署ごとに使った費用を分けて把握できる。"},{"cat":"アーキテクチャとサービス","term":"管理グループ","def":"複数のサブスクリプションを階層的に束ね、ポリシーやアクセス制御を一括適用する上位の管理単位。","analogy":"複数の支店をまとめる『本部』。本部の方針を全支店に一括で適用できる。"},{"cat":"アーキテクチャとサービス","term":"リソースグループ","def":"関連するリソースをまとめて管理・展開・削除できる論理コンテナ。各リソースは1つのグループに属する。","analogy":"プロジェクトごとの書類フォルダ。関連書類を1つにまとめ、不要になればフォルダごと処分できる。"},{"cat":"アーキテクチャとサービス","term":"Azure Resource Manager（ARM）","def":"Azureのすべてのリソース操作（作成・更新・削除）を受け付ける統合管理レイヤー。テンプレートによる宣言的デプロイを支える。","analogy":"建物の総合受付。あらゆる依頼はまずここを通り、適切な部署に振り分けられる。"},{"cat":"アーキテクチャとサービス","term":"ARMテンプレート / Bicep","def":"インフラ構成をコードで宣言的に定義し、再現性のある自動デプロイを行う仕組み。BicepはARMより簡潔な構文。","analogy":"家の設計図。同じ図面があれば、何度でも同じ家を正確に建てられる。"},{"cat":"アーキテクチャとサービス","term":"仮想マシン（VM）","def":"OSやソフトウェアを利用者が自由に制御できるIaaSのコンピューティング。柔軟だがOS保守は利用者の責任。","analogy":"自分で組み立てる自作PC。中身を自由に選べるが、メンテも自分でやる必要がある。"},{"cat":"アーキテクチャとサービス","term":"可用性セット","def":"VMを障害ドメインと更新ドメインに分散配置し、ハードウェア障害や計画メンテ時の同時停止を防ぐ仕組み。","analogy":"重要な荷物を別々のトラックに分けて運ぶイメージ。1台が事故っても全部は失わない。"},{"cat":"アーキテクチャとサービス","term":"仮想マシンスケールセット（VMSS）","def":"同一構成のVM群を負荷に応じて自動的に増減できる仕組み。大規模で可用性の高いワークロード向け。","analogy":"繁忙期に同じ仕事のアルバイトを自動で増員し、暇になれば減らすイメージ。"},{"cat":"アーキテクチャとサービス","term":"コンテナー","def":"ホストOSのカーネルを共有し、アプリと依存関係のみをパッケージ化する軽量な実行単位。起動が速い。","analogy":"お弁当箱。必要なおかず（アプリと依存物）だけを詰め、キッチン（OS）は共用するので手軽。"},{"cat":"アーキテクチャとサービス","term":"Azure Kubernetes Service（AKS）","def":"多数のコンテナのデプロイ・スケール・管理（オーケストレーション）を自動化するマネージドサービス。","analogy":"オーケストラの指揮者。大勢の演奏者（コンテナ）を統率し、全体を調和させる。"},{"cat":"アーキテクチャとサービス","term":"Azure Functions","def":"イベント駆動で実行されるサーバーレスのコンピューティング。インフラ管理が不要で、使った分だけ課金。","analogy":"人感センサー付きの照明。人が来た（イベント）ときだけ点灯し、いない間は電気代がかからない。"},{"cat":"アーキテクチャとサービス","term":"Azure App Service","def":"Webアプリ・API・モバイルバックエンドをインフラ管理なしでホストできるフルマネージドのPaaS。","analogy":"家具家電付きの賃貸物件。すぐ住め（デプロイでき）、設備の管理は大家任せ。"},{"cat":"アーキテクチャとサービス","term":"Azure Virtual Network（VNet）","def":"Azureリソース間やオンプレミスとのプライベートな通信を提供するネットワーク基盤。","analogy":"社内専用LAN。外から見えない安全な配線で、社内（リソース間）をつなぐ。"},{"cat":"アーキテクチャとサービス","term":"VPN Gateway","def":"公衆インターネット上に暗号化トンネルを張り、オンプレミスと仮想ネットワークを安全に接続する。","analogy":"公道（インターネット）を走る装甲車。中身は暗号化されて外から見えない。"},{"cat":"アーキテクチャとサービス","term":"ExpressRoute","def":"接続プロバイダー経由で、公衆インターネットを通らない専用のプライベート接続を提供する。低遅延・高帯域。","analogy":"一般道を通らない専用の高速トンネル。渋滞（インターネットの混雑）と無縁で安定して速い。"},{"cat":"アーキテクチャとサービス","term":"Azure DNS","def":"Microsoftのグローバルインフラ上でDNSドメインをホストし、ドメイン名をIPアドレスに解決する。","analogy":"電話帳。名前（ドメイン）から電話番号（IPアドレス）を引くイメージ。"},{"cat":"アーキテクチャとサービス","term":"Blob Storage","def":"画像・動画・バックアップなど、大量の非構造化オブジェクトデータを保存するストレージ。","analogy":"巨大なデジタル倉庫。形を問わずあらゆる『モノ（オブジェクト）』を放り込んで保管できる。"},{"cat":"アーキテクチャとサービス","term":"Azure Files","def":"SMB/NFSでマウントできるクラウド上の共有ファイルストレージ。複数マシンから同時アクセス可能。","analogy":"会社の共有ネットワークドライブ。複数人が同じフォルダを同時に使える。"},{"cat":"アーキテクチャとサービス","term":"ストレージ冗長性（LRS/ZRS/GRS）","def":"データの複製方法。LRSは単一データセンター内、ZRSは同一リージョンの複数ゾーン、GRSは別リージョンへ複製。","analogy":"大事な書類のコピー保管先。同じ部屋（LRS）／同じ街の別棟（ZRS）／遠方都市（GRS）と、守りの広さが違う。"},{"cat":"アーキテクチャとサービス","term":"Azure Migrate","def":"オンプレミス環境の評価からAzureへの移行までを一元的に支援するハブ。","analogy":"引っ越し業者の総合窓口。荷物の見積もりから運搬まで丸ごと面倒を見てくれる。"},{"cat":"アーキテクチャとサービス","term":"Azure Data Box","def":"帯域の制約でオンライン転送が難しい大容量データを、堅牢な物理デバイスに格納して輸送し取り込む。","analogy":"大量の荷物を回線ではなく宅配トラックで送るイメージ。ネットより物理で運ぶ方が速い場合がある。"},{"cat":"アーキテクチャとサービス","term":"AzCopy","def":"ストレージへのデータコピーや同期をコマンドラインで効率的に行うツール。自動化に向く。","analogy":"高速のコピー機をコマンド一発で動かすイメージ。手作業より速く正確に複製できる。"},{"cat":"IDとセキュリティ","term":"Microsoft Entra ID","def":"クラウドベースのID・アクセス管理サービス。ユーザーやアプリの認証と、リソースへの認可を担う。","analogy":"会社の入館証システム。誰が本人か確認し、どの部屋に入れるかを管理する。"},{"cat":"IDとセキュリティ","term":"認証（Authentication）","def":"利用者が本人であることを確認するプロセス。『あなたは誰か』を確かめる。","analogy":"空港でパスポートを見せて本人確認するイメージ。"},{"cat":"IDとセキュリティ","term":"認可（Authorization）","def":"認証済みの利用者が何にアクセスできるかを決めるプロセス。『何が許されるか』を決める。","analogy":"本人確認後に渡される搭乗券。乗れる便や座席（アクセス範囲）が決まっている。"},{"cat":"IDとセキュリティ","term":"シングルサインオン（SSO）","def":"1回の認証で複数のアプリにアクセスできる仕組み。管理するパスワードが減り利便性と安全性が向上。","analogy":"テーマパークの1日フリーパス。一度ゲートを通れば、各アトラクションに並ばず入れる。"},{"cat":"IDとセキュリティ","term":"多要素認証（MFA）","def":"知っているもの・持っているもの・本人自身（生体）のうち2種類以上を組み合わせて認証を強化する仕組み。","analogy":"銀行ATM。カード（持っているもの）と暗証番号（知っているもの）の両方がないと引き出せない。"},{"cat":"IDとセキュリティ","term":"パスワードレス認証","def":"Windows Hello・FIDO2セキュリティキー・認証アプリなどでパスワードを使わずに安全にサインインする方式。","analogy":"鍵を持ち歩かず、指紋や顔で開く玄関。盗まれたり忘れたりするパスワードがそもそも無い。"},{"cat":"IDとセキュリティ","term":"条件付きアクセス","def":"ユーザー・場所・デバイス・リスクなどの条件に基づき、MFA要求やアクセスのブロックを自動判断する仕組み。","analogy":"状況で対応を変える賢い門番。見慣れない場所から来た人には追加の本人確認を求める。"},{"cat":"IDとセキュリティ","term":"Azure RBAC（ロールベースアクセス制御）","def":"『誰に（プリンシパル）・どの権限を（ロール）・どの範囲で（スコープ）』を割り当ててアクセスを制御する仕組み。","analogy":"役職ごとの権限表。部長・一般社員で開けられる扉や見られる書類が決まっている。"},{"cat":"IDとセキュリティ","term":"Microsoft Entra Connect","def":"オンプレミスのActive DirectoryとEntra IDのIDを同期し、ハイブリッドID環境とSSOを実現するツール。","analogy":"社内名簿とクラウド名簿を自動で揃える同期係。どちらを見ても情報が一致する。"},{"cat":"IDとセキュリティ","term":"Microsoft Entra Domain Services","def":"ドメイン参加・グループポリシー・LDAP・Kerberosといった従来型ドメイン機能を、DC管理なしで提供するサービス。","analogy":"管理人不要の集合住宅の管理システム。従来は管理人（DC）が必要だった作業を自動で代行。"},{"cat":"IDとセキュリティ","term":"External ID（外部ID）","def":"取引先や顧客など組織外のユーザーのアクセスを安全に管理する仕組み（B2B/B2C）。","analogy":"来客用のゲストパス。社員ではない人にも、限られた範囲で安全に入館してもらえる。"},{"cat":"IDとセキュリティ","term":"Microsoft Defender for Cloud","def":"リソースのセキュリティ態勢を評価し（セキュアスコア）、脅威保護を提供するサービス。他クラウドも対象にできる。","analogy":"住宅の防犯診断＋警備システム。弱点を点数化して教え、侵入の兆候があれば警報を出す。"},{"cat":"IDとセキュリティ","term":"セキュアスコア","def":"Defender for Cloudが提示する、セキュリティ態勢を数値化した指標。改善すべき推奨事項とともに示される。","analogy":"健康診断の総合点。点が低い項目（弱点）が分かり、改善すれば点数が上がる。"},{"cat":"管理とガバナンス","term":"Azureポータル","def":"ブラウザーからGUIでAzureを統合的に管理するコンソール。リソースの作成・構成・監視ができる。","analogy":"クルマの運転席のダッシュボード。各種メーターとスイッチが一か所に集約されている。"},{"cat":"管理とガバナンス","term":"Azure Cloud Shell","def":"ブラウザー上で使えるBash/PowerShell対応のシェル。Azure CLI等がプリインストールされ、インストール不要。","analogy":"ネットカフェのPC。自分の環境を持ち込まなくても、必要な道具が最初から揃っている。"},{"cat":"管理とガバナンス","term":"Pricing Calculator（料金計算ツール）","def":"利用予定のサービス構成からコストを事前に見積もるツール。導入前の概算に使う。","analogy":"旅行前の予算シミュレーター。行き先や日程を入れると、おおよその費用が分かる。"},{"cat":"管理とガバナンス","term":"TCO計算ツール","def":"オンプレミス運用とAzure移行のコストを比較し、総保有コストの削減効果を推定するツール。","analogy":"持ち家と賃貸の総額比較シート。長い目で見てどちらが得かを試算する。"},{"cat":"管理とガバナンス","term":"Microsoft Cost Management","def":"実際のコストを可視化・分析し、予算設定やコストアラート、最適化提案を行うツール。","analogy":"家計簿アプリ。何にいくら使ったかを見える化し、使いすぎたら通知してくれる。"},{"cat":"管理とガバナンス","term":"タグ（Tags）","def":"リソースに『キー：値』のメタデータを付与し、整理・コスト配賦・検索を容易にする仕組み。","analogy":"荷物に貼る付箋ラベル。『営業部』『プロジェクトA』と書いておけば後で仕分けしやすい。"},{"cat":"管理とガバナンス","term":"Azure Policy","def":"リソースが組織のルールに準拠しているか評価し、非準拠リソースの作成拒否や修復を行う仕組み。","analogy":"工場の品質検査ライン。基準に合わない製品（リソース）を自動ではじく。"},{"cat":"管理とガバナンス","term":"イニシアティブ","def":"関連する複数のポリシー定義を1つにまとめ、一括で割り当て・管理できるグループ。","analogy":"複数のルールを束ねた『規程集』。1冊渡せばまとめて適用できる。"},{"cat":"管理とガバナンス","term":"リソースロック","def":"重要なリソースの誤った削除や変更を防止する保護機能。削除のみ防ぐ種類と、変更も防ぐ種類がある。","analogy":"『取扱注意・移動禁止』の固定ロック。うっかり捨てたり動かしたりするのを防ぐ。"},{"cat":"管理とガバナンス","term":"Microsoft Purview","def":"組織全体のデータの検出・分類・系統・ガバナンスとコンプライアンスを統合的に管理するサービス。","analogy":"巨大図書館の司書。どこに何のデータがあるかを把握し、機密度に応じて整理・管理する。"},{"cat":"管理とガバナンス","term":"Service Trust Portal","def":"Microsoftのコンプライアンス認証や監査レポート、セキュリティ・プライバシー文書を提供するポータル。","analogy":"企業の信頼性を示す『証明書ファイル棚』。各種認証や監査結果をまとめて確認できる。"},{"cat":"管理とガバナンス","term":"Azure Arc","def":"オンプレミスや他クラウドのリソースをAzureの管理面に取り込み、一元的に管理・ガバナンスする。","analogy":"離れた拠点を1つの本部から遠隔管理するイメージ。場所が違っても同じ画面でまとめて見る。"},{"cat":"管理とガバナンス","term":"Azure Advisor","def":"コスト・セキュリティ・信頼性・パフォーマンス・運用の観点でベストプラクティスに基づく推奨を提示する。","analogy":"パーソナルアドバイザー。『この設定を直すと安く・安全になりますよ』と助言してくれる。"},{"cat":"管理とガバナンス","term":"Azure Service Health","def":"利用中のサービスに影響する問題・計画メンテナンス・正常性アドバイザリの情報を提供する。","analogy":"鉄道の運行情報。自分が使う路線の遅延や工事予定を知らせてくれる。"},{"cat":"管理とガバナンス","term":"Azure Resource Health","def":"個々のリソースの現在の正常性状態と過去の履歴を示し、問題の原因把握に役立つ。","analogy":"特定の家電の動作ランプ。その機器が今、正常か不調かを個別に教えてくれる。"},{"cat":"管理とガバナンス","term":"Azure Monitor","def":"メトリックやログを収集・分析し、可視化・アラート・自動対応を行う包括的な監視サービス。","analogy":"病院の集中監視モニター。心拍や血圧（メトリック）を常時見守り、異常時に警報を鳴らす。"},{"cat":"管理とガバナンス","term":"Azure Marketplace","def":"Microsoftやサードパーティの認定ソリューション・アプリを見つけて展開できるオンラインストア。","analogy":"アプリストア。審査済みのアプリを探して、ワンクリックで導入できる。"},{"cat": "アーキテクチャとサービス", "term": "Azure Container Instances（ACI）", "def": "単一または少数のコンテナーを、オーケストレーション不要で最も手軽に素早く実行できるサーバーレス型のコンテナーサービス。", "analogy": "コンテナを1個だけポンと置いてすぐ火にかける“お手軽コンロ”。大量のコンテナを束ねて管理するAKSとは役割が違う。"}, {"cat": "アーキテクチャとサービス", "term": "Azure Virtual Desktop（AVD）", "def": "Windowsのデスクトップやアプリをクラウド上で仮想化し、どの端末からでもアクセスできるようにするデスクトップ仮想化（DaaS）サービス。", "analogy": "自分のWindowsデスクトップをクラウドに置いておき、自宅PCでも出先のタブレットでも“同じ机”を呼び出す感じ。"}, {"cat": "アーキテクチャとサービス", "term": "Azure Cosmos DB", "def": "世界中に分散して低遅延でデータを複製できる、フルマネージドのNoSQLデータベース。高いスケーラビリティとグローバルな可用性が特長。AZ-900では『マネージドなNoSQL DBで、グローバル分散できる』を押さえればOK。", "analogy": "世界中に支店を持ち、どの支店からでも同じ在庫に即アクセスできるグローバル倉庫。"}, {"cat": "アーキテクチャとサービス", "term": "Azure SQL Database", "def": "サーバーの構築・管理なしで使える、フルマネージドのリレーショナルデータベース（PaaS）。SQL Serverベース。", "analogy": "表計算の超強力版（表でデータを管理するDB）を、機械の面倒は見ずに“借りて使う”イメージ。"}, {"cat": "アーキテクチャとサービス", "term": "Azure SQL Managed Instance", "def": "オンプレミスのSQL Serverに近い高い互換性を保ちながら、運用をマネージドに任せられるデータベースサービス。既存SQL Serverの移行に向く。", "analogy": "自前のSQL Serverを“ほぼそのまま”、運用だけ業者に任せてクラウドへ引っ越しする感覚。"}, {"cat": "アーキテクチャとサービス", "term": "Queue Storage（キューストレージ）", "def": "大量のメッセージを一時的に貯めて、アプリ間で非同期にやり取りするためのストレージサービス。", "analogy": "受付に置く“注文票トレイ”。出す側がどんどん入れ、受け取る側が順番に処理していく。"}, {"cat": "アーキテクチャとサービス", "term": "Table Storage（テーブルストレージ）", "def": "キーと属性の形で、大量の構造化データを安価に保存できるNoSQL型のストレージ。", "analogy": "巨大だけど作りはシンプルな“住所録”。複雑な関係より、大量・安価・高速が得意。"}, {"cat": "アーキテクチャとサービス", "term": "Disk Storage（マネージドディスク）", "def": "仮想マシンにアタッチして使う、ブロックストレージ（仮想的なハードディスク）。OSやデータの保存先になる。", "analogy": "VMに挿し込む“仮想ハードディスク”。物理PCのSSD/HDDに当たるもの。"}, {"cat": "アーキテクチャとサービス", "term": "ストレージアクセス層（ホット/クール/アーカイブ）", "def": "Blobのアクセス頻度に応じてコストを最適化する層。よく使う=ホット、たまに=クール、めったに使わない長期保存=アーカイブ（最安だが取り出しに時間）。", "analogy": "よく使う物は“手元の棚”（ホット）、たまの物は“倉庫”（クール）、ほぼ出さない物は“遠方の貸倉庫”（アーカイブ）。"}, {"cat": "アーキテクチャとサービス", "term": "サブネット（Subnet）", "def": "仮想ネットワーク（VNet）を用途ごとに区切る、小さなネットワーク区画。", "analogy": "広い敷地（VNet）を、用途別に仕切った“区画”に分けるイメージ。"}, {"cat": "アーキテクチャとサービス", "term": "VNetピアリング（Peering）", "def": "2つの仮想ネットワーク（VNet）同士を接続し、相互に通信できるようにする仕組み。", "analogy": "隣り合う敷地（VNet）を“専用の通路”でつないで行き来できるようにする。"}, {"cat": "管理とガバナンス", "term": "Azure CLI / Azure PowerShell", "def": "コマンドでAzureを操作・自動化する管理ツール。Azure CLIはクロスプラットフォームのコマンド群、Azure PowerShellはコマンドレットで操作する。", "analogy": "画面のボタンを押す代わりに、“文字コマンド”でAzureを動かすリモコン。繰り返し作業の自動化に強い。"},{"cat": "IDとセキュリティ", "term": "Azure Key Vault", "def": "シークレット（パスワードやAPIキー）、暗号化キー、証明書などの機密情報を安全に保管・管理するサービス。アプリはこれらを直書きせず、Key Vaultから安全に取得して利用する。", "analogy": "アプリの機密情報専用の“デジタル金庫”。パスワードやカギ・証明書を安全に預けておき、必要なときだけ取り出す。"},{"cat": "管理とガバナンス", "term": "Azure Application Insights", "def": "Azure Monitorの一機能で、稼働中のWebアプリケーションのパフォーマンス・可用性・エラー・利用状況を監視・分析するAPM（アプリケーションパフォーマンス管理）サービス。応答時間の悪化や例外を検知し、原因の診断に役立つ。", "analogy": "アプリ専属の“健康モニター”。アプリの動きを常時見張り、遅延や不調・エラーをいち早く知らせてくれる。"},{"cat": "クラウドの概念", "term": "サービスレベルアグリーメント（SLA）", "def": "Microsoftが各Azureサービスについて保証する可用性・パフォーマンスの公式な合意（例：稼働率99.9%）。基準を満たせない場合はサービスクレジット（返金等）が適用される。複数サービスを直列に組み合わせると合成SLA（各SLAの掛け算）となり全体値は下がる。無料/プレビューのサービスにはSLAが無いことが多い。", "analogy": "サービスの“品質保証書”。『これだけは確実に動かします』という約束で、守れなければお詫び（クレジット）が出る。"}];
const CATS = [...new Set(QUESTIONS.map(q=>q.cat))];
const GCATS = [...new Set(GLOSSARY.map(g=>g.cat))];
const $ = id => document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// ---- タブ切り替え ----
$('tabQuiz').onclick=()=>{ $('tabQuiz').classList.add('active'); $('tabGloss').classList.remove('active'); $('modeQuiz').classList.remove('hidden'); $('modeGloss').classList.add('hidden'); };
$('tabGloss').onclick=()=>{ $('tabGloss').classList.add('active'); $('tabQuiz').classList.remove('active'); $('modeGloss').classList.remove('hidden'); $('modeQuiz').classList.add('hidden'); };
// ---- 問題集 ----
function fillCats(){ $('selCat').innerHTML = '<option value="__all">すべてのカテゴリ</option>' + CATS.map(c=>'<option value="'+c+'">'+c+'</option>').join(''); fillTopics(); }
function fillTopics(){ const cat=$('selCat').value; let pool=cat==='__all'?QUESTIONS:QUESTIONS.filter(q=>q.cat===cat); const topics=[...new Set(pool.map(q=>q.topic))]; $('selTopic').innerHTML='<option value="__all">すべてのテーマ</option>'+topics.map(t=>'<option value="'+t+'">'+t+'</option>').join(''); updateCount(); }
function currentPool(){ const cat=$('selCat').value, topic=$('selTopic').value; let pool=QUESTIONS.slice(); if(cat!=='__all')pool=pool.filter(q=>q.cat===cat); if(topic!=='__all')pool=pool.filter(q=>q.topic===topic); return pool; }
function updateCount(){ $('countInfo').textContent='対象問題数: '+currentPool().length+' 問（全 '+QUESTIONS.length+' 問）'; }
$('selCat').addEventListener('change',fillTopics); $('selTopic').addEventListener('change',updateCount);
let state=null;
function startQuiz(pool){ let qs=pool.slice(); if($('chkShuffle').checked)qs=shuffle(qs); qs=qs.map(q=>{ const cf=(i)=> q.multi?((q.answers||[]).includes(i)):(i===q.answer); let arr=q.choices.map((c,i)=>({c,correct:cf(i)})); if($('chkShuffle').checked)arr=shuffle(arr); return {...q,_choices:arr}; }); state={qs,idx:0,score:0,wrong:[],answered:false}; $('setup').classList.add('hidden'); $('result').classList.add('hidden'); $('quiz').classList.remove('hidden'); renderQ(); }
function renderQ(){ const q=state.qs[state.idx]; state.answered=false; state.sel=new Set(); const isMulti=!!q.multi; const need=isMulti?(q.answers||[]).length:1; $('topicPill').textContent=q.cat+' ／ '+q.topic; $('qText').textContent=(state.idx+1)+'. '+q.q+(isMulti?'（'+need+'つ選択）':''); $('exp').className='exp'; $('exp').innerHTML=''; $('btnNext').disabled=true; $('btnNext').textContent=state.idx===state.qs.length-1?'結果を見る':'次へ'; const box=$('choices'); box.innerHTML=''; q._choices.forEach((ch,i)=>{ const b=document.createElement('button'); b.className='choice'; b.textContent='ABCDE'[i]+'. '+ch.c; if(isMulti){ b.onclick=()=>toggleSel(b,i,q); } else { b.onclick=()=>pick(b,ch,q); } box.appendChild(b); }); const sb=$('btnSubmitMulti'); if(sb){ if(isMulti){ sb.style.display='inline-block'; sb.disabled=true; sb.onclick=()=>gradeMulti(q); } else { sb.style.display='none'; } } $('bar').style.width=Math.round(state.idx/state.qs.length*100)+'%'; $('progText').textContent='問題 '+(state.idx+1)+' / '+state.qs.length; $('scoreText').textContent='正解 '+state.score; }
function pick(btn,ch,q){ if(state.answered)return; state.answered=true; const all=[...document.querySelectorAll('#choices .choice')]; all.forEach(b=>b.classList.add('disabled')); const correctText=q._choices.find(c=>c.correct).c; all.forEach(b=>{ if(b.textContent.slice(3)===correctText)b.classList.add('correct'); }); if(ch.correct){state.score++;}else{btn.classList.add('wrong');state.wrong.push(q);} $('scoreText').textContent='正解 '+state.score; const e=$('exp'); e.className='exp show'; e.innerHTML='<b>'+(ch.correct?'正解':'不正解')+'</b><br>'+q.exp; $('btnNext').disabled=false; }
function toggleSel(b,i,q){ if(state.answered)return; const need=(q.answers||[]).length; if(state.sel.has(i)){ state.sel.delete(i); b.classList.remove('sel'); } else { if(state.sel.size>=need)return; state.sel.add(i); b.classList.add('sel'); } const sb=$('btnSubmitMulti'); if(sb)sb.disabled=(state.sel.size!==need); }
function gradeMulti(q){ if(state.answered)return; state.answered=true; const btns=[...document.querySelectorAll('#choices .choice')]; btns.forEach(b=>{b.classList.add('disabled');b.classList.remove('sel');}); const correctIdx=[]; q._choices.forEach((ch,i)=>{ if(ch.correct){correctIdx.push(i); if(btns[i])btns[i].classList.add('correct');} }); state.sel.forEach(i=>{ if(!q._choices[i].correct && btns[i])btns[i].classList.add('wrong'); }); const sel=[...state.sel].sort((a,b)=>a-b).join(','); const cor=correctIdx.slice().sort((a,b)=>a-b).join(','); const ok=sel===cor; if(ok)state.score++; else state.wrong.push(q); $('scoreText').textContent='正解 '+state.score; const e=$('exp'); e.className='exp show'; e.innerHTML='<b>'+(ok?'正解':'不正解')+'</b><br>'+q.exp; const sb=$('btnSubmitMulti'); if(sb)sb.style.display='none'; $('btnNext').disabled=false; }
$('btnNext').onclick=()=>{ if(state.idx<state.qs.length-1){state.idx++;renderQ();}else showResult(); };
$('btnQuit').onclick=()=>{ $('quiz').classList.add('hidden'); $('setup').classList.remove('hidden'); };
$('btnStart').onclick=()=>{ const p=currentPool(); if(p.length)startQuiz(p); };
function showResult(){ $('quiz').classList.add('hidden'); $('result').classList.remove('hidden'); const total=state.qs.length,pct=Math.round(state.score/total*100); $('resNum').textContent=state.score+' / '+total+'（'+pct+'%）'; let msg=pct>=85?'素晴らしい！合格圏内です。':pct>=70?'good! あと少しで安定圏です。':'復習して再挑戦しましょう。'; $('resText').textContent=msg+' 不正解: '+state.wrong.length+' 問'; $('btnReview').disabled=state.wrong.length===0; state._lastPool=state.qs; }
function baseQ(q){ const o={cat:q.cat,topic:q.topic,q:q.q,choices:q.choices,exp:q.exp}; if(q.multi){o.multi=true;o.answers=q.answers;}else{o.answer=q.answer;} return o; }
$('btnRetry').onclick=()=>{ startQuiz(state._lastPool.map(baseQ)); };
$('btnReview').onclick=()=>{ const w=state.wrong.map(baseQ); startQuiz(w); };
$('btnHome').onclick=()=>{ $('result').classList.add('hidden'); $('setup').classList.remove('hidden'); };
// ---- 単語帳 ----
let gMode='list', gIdx=0, gFiltered=GLOSSARY.slice();
function fillGCats(){ $('gCat').innerHTML='<option value="__all">すべてのカテゴリ</option>'+GCATS.map(c=>'<option value="'+c+'">'+c+'</option>').join(''); }
var REVKEY='az900_review_terms';
function loadRev(){ try{ return new Set(JSON.parse(localStorage.getItem(REVKEY)||'[]')); }catch(e){ return new Set(); } }
function saveRev(s){ try{ localStorage.setItem(REVKEY, JSON.stringify(Array.from(s))); }catch(e){} }
var REVSET=loadRev();
function isRev(term){ return REVSET.has(term); }
function toggleRev(term){ if(REVSET.has(term)) REVSET.delete(term); else REVSET.add(term); saveRev(REVSET); }
function gFilter(){ const cat=$('gCat').value, kw=$('gSearch').value.trim(); gFiltered=GLOSSARY.filter(g=>{ if(cat!=='__all'&&g.cat!==cat)return false; if(kw&&!(g.term+g.def+g.analogy).includes(kw))return false; if($('gRevOnly')&&$('gRevOnly').checked&&!REVSET.has(g.term))return false; return true; }); gIdx=0; $('gCount').textContent='該当: '+gFiltered.length+' 語（全 '+GLOSSARY.length+' 語）'; renderG(); }
function renderG(){ if(gMode==='list'){ $('gList').classList.remove('hidden'); $('gFlash').classList.add('hidden'); $('gList').innerHTML=gFiltered.map(g=>'<div class="gcard"><span class="gcat">'+esc(g.cat)+'</span><div class="gterm">'+esc(g.term)+'</div><div class="gdef">'+esc(g.def)+'</div><div class="gana"><b>たとえ：</b>'+esc(g.analogy)+'</div><button class="revbtn" data-term="'+esc(g.term)+'">'+(isRev(g.term)?'★ 要復習中':'☆ 要復習に追加')+'</button></div>').join('')||'<div class="card center" style="color:var(--sub);">該当する用語がありません</div>'; } else { $('gList').classList.add('hidden'); $('gFlash').classList.remove('hidden'); renderFlash(); } }
function renderFlash(){ if(!gFiltered.length){ $('fterm').textContent='該当なし'; $('fcat').textContent=''; $('fdef').textContent=''; $('fana').textContent=''; $('fProg').textContent='0 / 0'; return; } if(gIdx>=gFiltered.length)gIdx=0; const g=gFiltered[gIdx]; var _frv=$('fRev'); if(_frv){ _frv.className='revbtn'+(isRev(g.term)?' on':''); _frv.textContent=(isRev(g.term)?'★ 要復習中':'☆ 要復習に追加'); _frv.setAttribute('data-term', g.term); } $('flashCard').classList.remove('flipped'); $('fcat').textContent=g.cat; $('fterm').textContent=g.term; $('fdef').textContent=g.def; $('fana').innerHTML='<b>たとえ：</b>'+esc(g.analogy); $('fProg').textContent=(gIdx+1)+' / '+gFiltered.length; }
$('flashCard').onclick=()=>$('flashCard').classList.toggle('flipped');
$('fNext').onclick=()=>{ gIdx=(gIdx+1)%gFiltered.length; renderFlash(); };
$('fPrev').onclick=()=>{ gIdx=(gIdx-1+gFiltered.length)%gFiltered.length; renderFlash(); };
$('gModeList').onclick=()=>{ gMode='list'; $('gModeList').className='btn'; $('gModeCard').className='btn ghost'; renderG(); };
$('gModeCard').onclick=()=>{ gMode='card'; $('gModeCard').className='btn'; $('gModeList').className='btn ghost'; renderG(); };
$('gCat').addEventListener('change',gFilter); document.addEventListener('click',function(ev){ try{ var b=ev.target.closest&&ev.target.closest('.revbtn'); if(!b)return; var term=b.getAttribute('data-term'); if(!term)return; toggleRev(term); if(gMode==='list')renderG(); else renderFlash(); var ro=$('gRevOnly'); if(ro&&ro.checked)gFilter(); }catch(e){} }); var _ro=$('gRevOnly'); if(_ro)_ro.addEventListener('change',gFilter); $('gSearch').addEventListener('input',gFilter);
// init
fillCats(); fillGCats(); $('gModeList').className='btn'; $('gModeCard').className='btn ghost'; gMode='list'; gFilter();

})();
</script>
</body>
</html>
