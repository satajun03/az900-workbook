<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-900 練習問題アプリ</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1b2733;--sub:#5b6b7b;--brand:#0a64c2;--brand2:#0850a0;--ok:#138a36;--ng:#c2331a;--line:#e2e8f0;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;}
header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:22px 16px;}
header h1{margin:0;font-size:1.35rem;}
header p{margin:6px 0 0;opacity:.92;font-size:.85rem;}
.wrap{max-width:820px;margin:0 auto;padding:16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
h2{font-size:1.05rem;margin:0 0 12px;}
label{font-size:.85rem;color:var(--sub);display:block;margin-bottom:6px;}
select,button{font-size:1rem;font-family:inherit;}
select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:14px;}
.btn{background:var(--brand);color:#fff;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:600;transition:.15s;}
.btn:hover{background:var(--brand2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn.ghost{background:#eef3f9;color:var(--brand2);}
.btn.ghost:hover{background:#dfe9f5;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.toggle{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--sub);margin-bottom:14px;}
.toggle input{width:18px;height:18px;}
.progress{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px;}
.progress > i{display:block;height:100%;background:var(--brand);width:0;transition:.3s;}
.meta{display:flex;justify-content:space-between;font-size:.82rem;color:var(--sub);margin-bottom:10px;}
.pill{display:inline-block;background:#eef3f9;color:var(--brand2);font-size:.72rem;padding:3px 9px;border-radius:99px;margin-bottom:10px;}
.qtext{font-size:1.08rem;font-weight:600;margin:6px 0 16px;}
.choice{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:.12s;font-size:.98rem;}
.choice:hover{border-color:var(--brand);background:#f7fbff;}
.choice.correct{border-color:var(--ok);background:#eafaf0;}
.choice.wrong{border-color:var(--ng);background:#fdeeea;}
.choice.disabled{cursor:default;pointer-events:none;}
.exp{margin-top:8px;padding:13px 15px;border-radius:11px;background:#f3f7fc;border-left:4px solid var(--brand);font-size:.92rem;display:none;}
.exp.show{display:block;}
.exp b{color:var(--brand2);}
.result-num{font-size:2.4rem;font-weight:700;color:var(--brand);}
.center{text-align:center;}
.hidden{display:none;}
footer{text-align:center;color:var(--sub);font-size:.75rem;padding:20px;}
.tag{font-size:.72rem;color:var(--sub);}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding-top:0;padding-bottom:0;">
    <h1>AZ-900 練習問題アプリ</h1>
    <p>Microsoft Azure Fundamentals 対策 ｜ オリジナル問題集</p>
  </div>
</header>

<div class="wrap">
  <!-- 設定画面 -->
  <div id="setup" class="card">
    <h2>出題設定</h2>
    <label>カテゴリ</label>
    <select id="selCat"></select>
    <label>テーマ（任意・カテゴリ選択後に絞り込み）</label>
    <select id="selTopic"></select>
    <div class="toggle"><input type="checkbox" id="chkShuffle" checked><label for="chkShuffle" style="margin:0;">問題と選択肢をシャッフルする</label></div>
    <div class="row">
      <button class="btn" id="btnStart">開始する</button>
    </div>
    <p class="tag" id="countInfo" style="margin-top:12px;"></p>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz" class="card hidden">
    <div class="progress"><i id="bar"></i></div>
    <div class="meta"><span id="progText"></span><span id="scoreText"></span></div>
    <span class="pill" id="topicPill"></span>
    <div class="qtext" id="qText"></div>
    <div id="choices"></div>
    <div class="exp" id="exp"></div>
    <div class="row" style="margin-top:16px;justify-content:space-between;">
      <button class="btn ghost" id="btnQuit">中断して設定へ</button>
      <button class="btn" id="btnNext" disabled>次へ</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result" class="card hidden center">
    <h2>結果</h2>
    <p class="result-num" id="resNum"></p>
    <p id="resText" style="color:var(--sub);"></p>
    <div class="row center" style="justify-content:center;margin-top:8px;">
      <button class="btn" id="btnRetry">もう一度（同じ範囲）</button>
      <button class="btn ghost" id="btnReview" disabled>間違えた問題だけ復習</button>
      <button class="btn ghost" id="btnHome">設定に戻る</button>
    </div>
  </div>
</div>

<footer>AZ-900 練習問題アプリ ｜ 問題はオリジナルに作成された学習用コンテンツです</footer>

<script>
const QUESTIONS = [{"cat":"クラウドの概念","topic":"クラウドコンピューティングの特徴","q":"クラウドコンピューティングの基本的な特徴として最も適切なものはどれですか？","choices":["物理サーバーを自社で購入し保有する必要がある","インターネット経由でオンデマンドにコンピューティング資源を利用できる","利用量に関係なく常に固定の料金が発生する","リソースの増減には数週間の調達期間が必要"],"answer":1,"exp":"クラウドは、必要なときに必要なだけリソースをインターネット経由でオンデマンドに利用できる点が本質的な特徴です。"},{"cat":"クラウドの概念","topic":"クラウドコンピューティングの特徴","q":"クラウドの「従量課金（消費ベース）モデル」を最もよく表しているのはどれですか？","choices":["年間契約で前払いした分だけ使える","実際に使用したリソース量に応じて課金される","使わなくても最大容量分の料金がかかる","無料で無制限に利用できる"],"answer":1,"exp":"消費ベースモデルでは、実際に使用したリソース量に基づいて課金されるため、無駄なコストを抑えられます。"},{"cat":"クラウドの概念","topic":"クラウドサービスの拡張機能","q":"需要の増減に応じてリソースを自動的に増減させるクラウドの能力を何と呼びますか？","choices":["弾力性（エラスティシティ）","冗長性","耐障害性","局所性"],"answer":0,"exp":"弾力性（エラスティシティ）は、需要に応じてリソースを自動的に拡大・縮小する能力を指します。"},{"cat":"クラウドの概念","topic":"クラウドサービスの拡張機能","q":"スケールアップ（垂直スケーリング）の説明として正しいものはどれですか？","choices":["同種のサーバーの台数を増やす","既存のサーバーのCPUやメモリなどの性能を増強する","データを複数リージョンに複製する","不要なリソースを削除する"],"answer":1,"exp":"スケールアップ（垂直スケーリング）は単一インスタンスの性能を増強することです。台数を増やすのはスケールアウト（水平スケーリング）です。"},{"cat":"クラウドの概念","topic":"責任共有モデルの基本","q":"クラウドの責任共有モデルにおいて、物理データセンターのセキュリティに責任を持つのは誰ですか？","choices":["利用者（顧客）","クラウドプロバイダー","第三者監査機関","利用者とプロバイダーが折半"],"answer":1,"exp":"物理データセンターや物理ホスト、物理ネットワークのセキュリティは、常にクラウドプロバイダーの責任範囲です。"},{"cat":"クラウドの概念","topic":"責任共有モデルの基本","q":"責任共有モデルで、どのサービスモデルでも常に利用者側の責任に含まれるものはどれですか？","choices":["物理ホストの保守","データとアクセス権（アカウント／ID）の管理","ハイパーバイザーの管理","データセンターの電源管理"],"answer":1,"exp":"データそのもの、デバイス、アカウント／IDの管理は、IaaS・PaaS・SaaSのいずれでも常に利用者の責任に残ります。"},{"cat":"クラウドの概念","topic":"クラウドサービスモデルの責任範囲","q":"IaaS・PaaS・SaaSを利用者の管理責任が大きい順に並べたものはどれですか？","choices":["SaaS > PaaS > IaaS","IaaS > PaaS > SaaS","PaaS > IaaS > SaaS","すべて同じ"],"answer":1,"exp":"IaaSは利用者がOSやミドルウェアまで管理するため責任が最も大きく、SaaSは利用者の責任が最も小さくなります。"},{"cat":"クラウドの概念","topic":"クラウドサービスモデルの責任範囲","q":"OSのパッチ適用が利用者の責任となるのは主にどのサービスモデルですか？","choices":["SaaS","PaaS","IaaS","いずれも責任なし"],"answer":2,"exp":"IaaSでは仮想マシンのOS管理（パッチ適用含む）が利用者の責任です。PaaS・SaaSではプロバイダーが基盤を管理します。"},{"cat":"クラウドの概念","topic":"クラウドモデルの特徴","q":"パブリッククラウドの特徴として最も適切なものはどれですか？","choices":["単一組織が専有するインフラ","複数の組織が共有するプロバイダー所有のインフラを利用","自社データセンター内のみで完結","インターネットに一切接続しない"],"answer":1,"exp":"パブリッククラウドは、プロバイダーが所有・運用するインフラを複数の組織が共有して利用する形態です。"},{"cat":"クラウドの概念","topic":"クラウドモデルの特徴","q":"ハイブリッドクラウドの説明として正しいものはどれですか？","choices":["パブリッククラウドのみを利用する形態","オンプレミスとパブリッククラウドを組み合わせて連携させる形態","複数のパブリッククラウドのみを併用する形態","クラウドを一切使わない形態"],"answer":1,"exp":"ハイブリッドクラウドは、オンプレミス／プライベートクラウドとパブリッククラウドを組み合わせて連携させる構成です。"},{"cat":"クラウドの概念","topic":"マルチクラウド環境の利用","q":"マルチクラウドを採用する主な理由として適切でないものはどれですか？","choices":["特定ベンダーへのロックイン回避","各クラウドの得意なサービスを使い分ける","可用性や冗長性の向上","すべてのデータを単一ベンダーに集約して管理を単純化する"],"answer":3,"exp":"マルチクラウドはロックイン回避やサービスの使い分け、冗長性向上が目的です。単一ベンダーへの集約はその目的に反します。"},{"cat":"クラウドの概念","topic":"CapExとOpExの違い","q":"CapEx（資本的支出）に該当するのはどれですか？","choices":["毎月のクラウド利用料","自社サーバーやデータセンター設備の購入費用","従量課金のストレージ料金","サブスクリプションの月額費用"],"answer":1,"exp":"CapExは設備や資産を前もって購入するための支出です。クラウドの従量課金は一般にOpExです。"},{"cat":"クラウドの概念","topic":"CapExとOpExの違い","q":"クラウドの従量課金モデルが分類される支出区分はどれですか？","choices":["CapEx（資本的支出）","OpEx（運用的支出）","減価償却費","固定資産"],"answer":1,"exp":"クラウドの利用料は使った分を経費として支払うOpEx（運用的支出）に分類されます。"},{"cat":"クラウドの概念","topic":"クラウドコンピューティングの利点","q":"クラウド導入により市場投入までの時間が短縮される理由として最も適切なものはどれですか？","choices":["物理機器の調達・構築を待たずにすぐリソースを利用できるから","ハードウェアを必ず自社購入するから","リソース増減に数週間かかるから","常にオンプレミスで構築するから"],"answer":0,"exp":"クラウドでは数分でリソースを展開できるため、機器調達や構築の待ち時間がなくなり、素早く形にできます。"},{"cat":"クラウドの概念","topic":"クラウドの高可用性の特徴","q":"高可用性（High Availability）が意味するものとして最も適切なものはどれですか？","choices":["障害が起きてもシステムが継続して稼働できるよう設計されていること","データを暗号化すること","コストを最小化すること","処理速度を最大化すること"],"answer":0,"exp":"高可用性は、障害発生時でもダウンタイムを最小化し、サービスを継続的に提供できる特性を指します。"},{"cat":"クラウドの概念","topic":"スケーラビリティの利点","q":"スケーラビリティの利点として最も適切なものはどれですか？","choices":["需要に合わせてリソースを増減でき、性能を確保しつつコストを最適化できる","データを永久に削除できる","物理的なセキュリティを強化できる","ネットワーク遅延をゼロにできる"],"answer":0,"exp":"スケーラビリティにより、負荷に応じてリソースを柔軟に増減でき、過不足のないコスト最適化が可能になります。"},{"cat":"クラウドの概念","topic":"クラウドの信頼性の提供方法","q":"クラウドにおける信頼性を高める仕組みとして最も適切なものはどれですか？","choices":["単一のデータセンターに集約する","複数のリージョンや可用性ゾーンに分散配置する","バックアップを取得しない","リソースを最小化する"],"answer":1,"exp":"信頼性は、地理的に分散したリージョンや可用性ゾーンへの配置・冗長化により高められます。"},{"cat":"クラウドの概念","topic":"予測可能性のためのクラウドの特徴","q":"クラウドにおけるコストの予測可能性を支援するものはどれですか？","choices":["料金計算ツールやコスト管理ツール","物理サーバーの購入","ランダムな課金","予算管理機能を使わないこと"],"answer":0,"exp":"料金計算ツールやCost Managementにより、コストを事前に見積もり・追跡でき、予測可能性が高まります。"},{"cat":"クラウドの概念","topic":"クラウドでのガバナンス","q":"クラウドのガバナンスを実現する仕組みとして最も適切なものはどれですか？","choices":["ポリシーやルールを定義しリソースの準拠状態を統制する","すべてのユーザーに管理者権限を付与する","リソースに一切制限をかけない","コストを記録しない"],"answer":0,"exp":"ガバナンスは、ポリシーや標準を定義し、リソースがルールに準拠しているかを統制・監査する仕組みで実現します。"},{"cat":"クラウドの概念","topic":"セキュリティ戦略の選択","q":"クラウドのセキュリティを高める基本的な考え方として最も適切なものはどれですか？","choices":["多層防御と最小特権を組み合わせる","すべてのポートを開放する","パスワードを共有する","認証を無効化する"],"answer":0,"exp":"多層防御と最小特権の原則を組み合わせることが、堅牢なセキュリティ戦略の基本です。"},{"cat":"クラウドの概念","topic":"クラウド管理の利点","q":"クラウドによる管理の利点として最も適切なものはどれですか？","choices":["インフラの保守やパッチ適用をプロバイダーに任せられる場合があり運用負荷が下がる","必ず自社で物理機器を管理する必要がある","スケールできない","コストが必ず固定になる"],"answer":0,"exp":"特にPaaSやSaaSでは、基盤の保守・更新をプロバイダーが担うため運用負荷が軽減されます。"},{"cat":"クラウドの概念","topic":"管理方法の選択","q":"オンプレミスと比較したクラウド管理の特徴として正しいものはどれですか？","choices":["ハードウェアの物理管理が中心になる","ポータルやCLI、テンプレートで一元的にリソースを管理できる","管理を自動化できない","リソースの可視化ができない"],"answer":1,"exp":"クラウドでは、ポータル・CLI・PowerShell・テンプレートを通じてリソースを一元的に管理・自動化できます。"},{"cat":"アーキテクチャとサービス","topic":"Azureで可能なこと","q":"Microsoft Azureで実現できることとして適切でないものはどれですか？","choices":["仮想マシンやコンテナの実行","データの保存と分析","Webアプリやデータベースのホスティング","物理サーバーを利用者の自宅へ無償配送する"],"answer":3,"exp":"Azureは仮想マシン・コンテナ・ストレージ・データベース・Webホスティングなど幅広いクラウドサービスを提供しますが、物理機器を配送するものではありません。"},{"cat":"アーキテクチャとサービス","topic":"Azureの特徴について","q":"Azureのグローバルインフラの特徴として正しいものはどれですか？","choices":["世界中のリージョンとデータセンターで構成される","単一国のみで提供される","インターネット非接続","物理拠点を持たない"],"answer":0,"exp":"Azureは世界中に分散したリージョンとデータセンターから構成され、グローバルにサービスを提供します。"},{"cat":"アーキテクチャとサービス","topic":"Azureサブスクリプションの利用方法","q":"Azureサブスクリプションの役割として最も適切なものはどれですか？","choices":["リソースの課金とアクセスを束ねる単位","物理サーバーの型番","ネットワークの帯域幅","暗号化アルゴリズム"],"answer":0,"exp":"サブスクリプションは、 ですか？","choices":["Azureポータル","Azure CLI / Azure PowerShell","ARM/Bicepテンプレート","物理スイッチのケーブル抜き差し"],"answer":3,"exp":"AzureリソースはポータルやCLI、PowerShell、テンプレート、REST APIで管理します。物理ケーブルの操作は対象外です。"},{"cat":"管理とガバナンス","topic":"Azure Marketplaceの特性","q":"Azure Marketplaceの特性として正しいものはどれですか？","choices":["Microsoftやサードパーティのソリューション・アプリを見つけて展開できる","物理サーバーを購入する場","DNSサービス","コスト削減専用ツール"],"answer":0,"exp":"Azure Marketplaceは、Microsoftやパートナーが提供する認定済みソフトウェアやサービスを検索・購入・デプロイできるオンラインストアです。"},{"cat":"管理とガバナンス","topic":"Azure計算ツールの目的","q":"Azure Pricing Calculator（料金計算ツール）の目的として正しいものはどれですか？","choices":["利用予定のサービス構成からコストを事前に見積もる","実際の請求額を支払う","リソースをデプロイする","脅威を検出する"],"answer":0,"exp":"Pricing Calculatorは、利用するサービスや構成を選択して、導入前にコストの概算を見積もるためのツールです。"},{"cat":"管理とガバナンス","topic":"TCO計算ツールの機能","q":"TCO（総保有コスト）計算ツールの機能として正しいものはどれですか？","choices":["オンプレミス運用とAzure移行のコストを比較し総保有コストを推定する","リアルタイムの脅威を検出する","DNSを解決する","VMをスケールする"],"answer":0,"exp":"TCO計算ツールは、現在のオンプレミス環境のコストとAzure移行後のコストを比較し、総保有コストの削減効果を見積もります。"},{"cat":"管理とガバナンス","topic":"Azure Cost Managementの機能","q":"Microsoft Cost Management の機能として正しいものはどれですか？","choices":["実際のコストの分析・可視化と予算・アラートの設定ができる","コストを事前見積もりするだけ","脅威を検出する","DNSをホストする"],"answer":0,"exp":"Cost Managementは、実際の利用コストを可視化・分析し、予算の設定やコストアラート、推奨による最適化を行うツールです。"},{"cat":"管理とガバナンス","topic":"コストアラートの種類","q":"Cost Managementで設定できるアラートとして適切なものはどれですか？","choices":["予算アラート（予算に対する実績・予測の超過通知）","物理障害アラートのみ","DNSアラートのみ","アラートは設定できない"],"answer":0,"exp":"Cost Managementでは、予算に対する実績や予測支出がしきい値を超えた際に通知する予算アラートなどを設定できます。"},{"cat":"管理とガバナンス","topic":"クラウドリソース管理の方法","q":"Infrastructure as Code（コードによるインフラ管理）の利点として正しいものはどれですか？","choices":["環境を再現可能・一貫した形で自動デプロイできる","手作業でしか構築できない","構成を文書化できない","スケールできない"],"answer":0,"exp":"IaCは、テンプレート（ARM/Bicep等）でインフラ構成をコード化し、再現性と一貫性のある自動デプロイを可能にします。"},{"cat":"管理とガバナンス","topic":"タグ付けの目的と効果","q":"Azureのタグ（Tags）の目的として正しいものはどれですか？","choices":["リソースにメタデータを付与し、整理・コスト配賦・検索を容易にする","リソースを暗号化する","リソースを高速化する","DNSを解決する"],"answer":0,"exp":"タグは『キー：値』のメタデータをリソースに付与し、部門やプロジェクト単位でのコスト配賦・整理・フィルタリングを容易に とガバナンス","topic":"Service Trust Portalへのアクセス要件","q":"Service Trust Portalの一部の機密文書にアクセスする際の一般的な要件はどれですか？","choices":["組織アカウントでのサインインが必要な場合がある","誰でも常に無制限に閲覧できる","物理デバイスが必要","アクセスは不可能"],"answer":0,"exp":"一部の監査レポートなどの機密文書の閲覧には、組織のアカウントでのサインインや契約条件への同意が求められる場合があります。"},{"cat":"管理とガバナンス","topic":"Azure環境管理に必要なツール","q":"ブラウザーからGUIでAzureを管理する主要なツールはどれですか？","choices":["Azureポータル","物理コンソールケーブル","DNSレコード","タグ"],"answer":0,"exp":"Azureポータルは、Webブラウザーから利用できるGUIの統合管理コンソールで、リソースの作成・構成・監視ができます。"},{"cat":"管理とガバナンス","topic":"Azure Cloud Shellの特徴","q":"Azure Cloud Shellの特徴として正しいものはどれですか？","choices":["ブラウザー上で使えるBash/PowerShell対応のシェル環境","ローカルにインストールが必須のアプリ","DNSサービス","コスト見積りツール"],"answer":0,"exp":"Cloud Shellは、ブラウザーから直接利用できるシェルで、BashとPowerShellに対応し、Azure CLIなどがプリインストールされています。"},{"cat":"管理とガバナンス","topic":"Azure Arcの機能について","q":"Azure Arcの機能として正しいものはどれですか？","choices":["オンプレミスや他クラウドのリソースをAzureの管理面に取り込み一元管理する","Azure内のVMのみ管理する","DNSをホストする","コストを見積もる"],"answer":0,"exp":"Azure Arcは、オンプレミスやマルチクラウド上のサーバー・Kubernetes・データサービスをAzureの管理・ガバナンス基盤に統合します。"},{"cat":"管理とガバナンス","topic":"Azure Arcで管理可能なリソース","q":"Azure Arcで管理できる対象として適切でないものはどれですか？","choices":["オンプレミスのサーバー","Kubernetesクラスター","一部のAzureデータサービス","利用者のスマートフォンのバッテリー"],"answer":3,"exp":"Arcはサーバー、Kubernetes、対応するデータサービスなどを管理対象にできます。個人端末のバッテリーは対象外です。"},{"cat":"管理とガバナンス","topic":"Azure Resource Managerの機能","q":"Azure Resource Manager（ARM）の機能として正しいものはどれですか？","choices":["Azureリソースの作成・更新・削除を統括するデプロイ・管理レイヤー","脅威を検出する","DNSを解決する","コストを削減する"],"answer":0,"exp":"ARMは、Azureのすべてのリソース操作（作成・構成・削除）を受け付ける統合管理レイヤーで、テンプレートによる宣言的デプロイを支えます。"},{"cat":"管理とガバナンス","topic":"ARMテンプレートの利点","q":"ARMテンプレートの利点として正しいものはどれですか？","choices":["JSONで宣言的にインフラを定義し、再現性のある自動デプロイができる","手作業でしか展開できない","構成を再利用できない","スケールできない"],"answer":0,"exp":"ARMテンプレートはJSONで望ましい状態を宣言的に記述し、繰り返し一貫した形でインフラをデプロイできます。"},{"cat":"管理とガバナンス","topic":"Bicepの特徴","q":"Bicepの特徴として正しいものはどれですか？","choices":["ARMより簡潔で読みやすい構文のIaC言語で、最終的にARMに変換される","プログラミング不要のGUIのみ","DNSサービス","コスト集計ツール"],"answer":0,"exp":"BicepはARMテンプレートの抽象化で、より簡 const CATS = [...new Set(QUESTIONS.map(q=>q.cat))];

const $ = id => document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// セットアップ
function fillCats(){
  $('selCat').innerHTML = '<option value="__all">すべてのカテゴリ</option>' + CATS.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
  fillTopics();
}
function fillTopics(){
  const cat = $('selCat').value;
  let pool = cat==='__all' ? QUESTIONS : QUESTIONS.filter(q=>q.cat===cat);
  const topics = [...new Set(pool.map(q=>q.topic))];
  $('selTopic').innerHTML = '<option value="__all">すべてのテーマ</option>' + topics.map(t=>'<option value="'+t+'">'+t+'</option>').join('');
  updateCount();
}
function currentPool(){
  const cat=$('selCat').value, topic=$('selTopic').value;
  let pool = QUESTIONS.slice();
  if(cat!=='__all') pool = pool.filter(q=>q.cat===cat);
  if(topic!=='__all') pool = pool.filter(q=>q.topic===topic);
  return pool;
}
function updateCount(){ $('countInfo').textContent = '対象問題数: ' + currentPool().length + ' 問（全 ' + QUESTIONS.length + ' 問）'; }

$('selCat').addEventListener('change', fillTopics);
$('selTopic').addEventListener('change', updateCount);

// クイズ状態
let state = null;
function startQuiz(pool){
  let qs = pool.slice();
  if($('chkShuffle').checked) qs = shuffle(qs);
  // 各問の選択肢をシャッフル（正解インデックスを追従）
  qs = qs.map(q=>{
    if(!$('chkShuffle').checked) return {...q, _choices:q.choices.map((c,i)=>({c,correct:i===q.answer}))};
    const arr = shuffle(q.choices.map((c,i)=>({c,correct:i===q.answer})));
    return {...q, _choices:arr};
  });
  state = {qs, idx:0, score:0, wrong:[], answered:false};
  $('setup').classList.add('hidden');
  $('result').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  renderQ();
}
function renderQ(){
  const q = state.qs[state.idx];
  state.answered=false;
  $('topicPill').textContent = q.cat + ' ／ ' + q.topic;
  $('qText').textContent = (state.idx+1)+'. '+q.q;
  $('exp').className='exp'; $('exp').innerHTML='';
  $('btnNext').disabled=true;
  $('btnNext').textContent = state.idx===state.qs.length-1 ? '結果を見る' : '次へ';
  const box=$('choices'); box.innerHTML='';
  q._choices.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='choice'; b.textContent='ABCD'[i]+'. '+ch.c;
    b.onclick=()=>pick(b,ch,q);
    box.appendChild(b);
  });
  const pct=Math.round(state.idx/state.qs.length*100);
  $('bar').style.width=pct+'%';
  $('progText').textContent='問題 '+(state.idx+1)+' / '+state.qs.length;
  $('scoreText').textContent='正解 '+state.score;
}
function pick(btn,ch,q){
  if(state.answered) return;
  state.answered=true;
  const all=[...document.querySelectorAll('.choice')];
  all.forEach(b=>b.classList.add('disabled'));
  all.forEach(b=>{ if(b.textContent.slice(3)===q._choices.find(c=>c.correct).c) b.classList.add('correct'); });
  if(ch.correct){ state.score++; }
  else { btn.classList.add('wrong'); state.wrong.push(q); }
  $('scoreText').textContent='正解 '+state.score;
  const e=$('exp'); e.className='exp show';
  e.innerHTML='<b>'+(ch.correct?'正解':'不正解')+'</b><br>'+q.exp;
  $('btnNext').disabled=false;
}
$('btnNext').onclick=()=>{
  if(state.idx<state.qs.length-1){ state.idx++; renderQ(); }
  else showResult();
};
$('btnQuit').onclick=()=>{ $('quiz').classList.add('hidden'); $('setup').classList.remove('hidden'); };
$('btnStart').onclick=()=>{ const p=currentPool(); if(p.length) startQuiz(p); };

function showResult(){
  $('quiz').classList.add('hidden');
  $('result').classList.remove('hidden');
  const total=state.qs.length, pct=Math.round(state.score/total*100);
  $('resNum').textContent=state.score+' / '+total+'（'+pct+'%）';
  let msg = pct>=85?'素晴らしい！合格圏内です。':pct>=70?'good! あと少しで安定圏です。':'復習して再挑戦しましょう。';
  $('resText').textContent=msg+' 不正解: '+state.wrong.length+' 問';
  $('btnReview').disabled = state.wrong.length===0;
  state._lastPool = state.qs;
}
$('btnRetry').onclick=()=>{ startQuiz(state._lastPool.map(q=>({cat:q.cat,topic:q.topic,q:q.q,choices:q.choices,answer:q.answer,exp:q.exp}))); };
$('btnReview').onclick=()=>{ const w=state.wrong.map(q=>({cat:q.cat,topic:q.topic,q:q.q,choices:q.choices,answer:q.answer,exp:q.exp})); startQuiz(w); };
$('btnHome').onclick=()=>{ $('result').classList.add('hidden'); $('setup').classList.remove('hidden'); };

fillCats();
</script>
